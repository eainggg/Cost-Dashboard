<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCM Cost Dashboard — June 2026</title>
<!-- Fully self-contained: charts drawn by the built-in SVG engine, no internet needed -->
<style>
:root{
  --accent:#F59E0B; --accent-dk:#D97706; --accent-soft:#FBEAD0; --accent-ink:#3A2606;
  --red:#DC2626; --red-dk:#B91C1C; --red-soft:#FCE4E4;
  --green:#15803D; --green-dk:#12602F; --green-soft:#DCF3E4;
  --gold:#B45309; --gold-soft:#FBEBC8;
  --navy:#1F2A44; --navy-soft:#EEF1F6;
  --teal:#0D9488; --teal-soft:#D8EEEB;
  --ink:#1B2333; --ink-2:#3D4759; --ink-3:#5A6577;
  --bg:#F4F6F9; --card:#FFFFFF; --line:#E5E8EE;
  /* professional light theme: content sits on white; these "on-*" vars now carry DARK ink so the topbar/section headers/footer read correctly on the light canvas (the navy sidebar uses its own hard-coded whites) */
  --on-dark:#1B2333; --on-dark-2:#3D4759; --on-dark-3:#5A6577; --dark-line:#E5E8EE;
  --shadow:0 1px 2px rgba(16,24,40,.06),0 8px 24px rgba(16,24,40,.07);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px}
body{font-family:-apple-system,"Segoe UI",Roboto,"Prompt","Helvetica Neue",sans-serif;background:var(--bg);color:var(--ink);display:flex;min-height:100vh}
/* ---------------- sidebar ---------------- */
aside{width:236px;min-width:236px;background:var(--navy);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--dark-line)}
.logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo .mk{display:flex;align-items:center;gap:10px}
.logo .sq{width:34px;height:34px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.logo h1{font-size:14px;font-weight:800;letter-spacing:.4px;line-height:1.25;color:#fff}
.logo span{display:block;font-size:10px;font-weight:400;color:#AEB4C2;letter-spacing:1.6px;text-transform:uppercase;margin-top:2px}
nav{flex:1;overflow-y:auto;padding:14px 12px}
.ngroup{font-size:9.5px;letter-spacing:1.8px;text-transform:uppercase;color:#8A91A1;margin:16px 10px 6px;font-weight:700}
.nitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;font-size:13px;color:#D3D7E0;cursor:pointer;margin-bottom:2px;border-left:3px solid transparent;transition:background .15s,color .15s}
.nitem:hover{background:rgba(255,255,255,.07);color:#fff}
.nitem.on{background:rgba(245,158,11,.18);color:#fff;border-left-color:var(--accent);font-weight:700}
.nitem svg{flex:0 0 auto;opacity:.95}
.sfoot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:#99A0AF;line-height:1.7}
/* ---------------- main ---------------- */
main{flex:1;min-width:0;display:flex;flex-direction:column}
#topbar{position:sticky;top:0;z-index:50;background:rgba(244,246,249,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:18px}
#ptitle h2{font-size:19px;font-weight:800;color:var(--on-dark)}
#ptitle p{font-size:11.5px;color:var(--on-dark-2);margin-top:1px}
.spacer{flex:1}
.ctl{display:flex;align-items:center;gap:8px}
.ctl label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--on-dark-2);font-weight:700}
select{appearance:none;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 30px 8px 12px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%2339414F"/></svg>');background-repeat:no-repeat;background-position:right 10px center}
.seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{border:0;background:transparent;padding:8px 14px;font-size:12px;font-weight:700;color:var(--ink-2);cursor:pointer}
.seg button.on{background:var(--accent);color:var(--accent-ink)}
#page{padding:24px 28px 48px;max-width:1480px;width:100%;margin:0 auto}
/* ---------------- components ---------------- */
.ptop{margin-bottom:18px}
.ptop h3{font-size:23px;font-weight:800;letter-spacing:-.2px;color:var(--on-dark)}
.ptop .rule{width:46px;height:3px;background:var(--accent);border-radius:2px;margin-top:8px}
.grid{display:grid;gap:14px}
.cards4{grid-template-columns:repeat(4,1fr)}
.cards3{grid-template-columns:repeat(3,1fr)}
.cards2{grid-template-columns:repeat(2,1fr)}
.g2{grid-template-columns:1.35fr 1fr}
.g2e{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
/* Summary top: hero beside a 2×2 of the four segment cards; the cards fill the hero's height */
.summ-segs{grid-template-columns:1fr 1fr;grid-auto-rows:1fr;gap:14px}
.summ-segs .card{display:flex;flex-direction:column;justify-content:center}
@media(max-width:1150px){.cards4,.cards3,.g3{grid-template-columns:repeat(2,1fr)}.g2,.g2e{grid-template-columns:1fr}
  .summ-top{grid-template-columns:1fr!important}.summ-segs{grid-auto-rows:auto}}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:16px 18px;min-width:0}
.card h4{font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-3);font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.hero{background:linear-gradient(135deg,#22305A 0%,#161E38 100%);color:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
.hero h4{color:#AEB8D4}
.hero .big{font-size:52px;font-weight:400;letter-spacing:-1.5px;line-height:1.05;color:#fff}
.hero .big b{font-weight:800;color:var(--accent)}
.hero .unit{font-size:16px;color:#AEB8D4;font-weight:600;margin-left:10px}
.hero .sub{color:#C6CCDA}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:190px;height:190px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.30),transparent 70%)}
.kv{font-size:34px;font-weight:400;letter-spacing:-.8px;line-height:1.1;color:var(--ink)}
.kv b{font-weight:800}
.kv .unit{font-size:13px;color:var(--ink-3);font-weight:600;margin-left:8px}
.sub{font-size:11px;color:var(--ink-2);margin-top:6px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.chip{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.chip.clk{cursor:pointer;transition:filter .12s,box-shadow .12s}
.chip.clk:hover{filter:brightness(.94);box-shadow:0 0 0 2px rgba(31,42,68,.12)}
.chip.up{background:var(--red-soft);color:var(--red-dk)}
.chip.dn{background:var(--green-soft);color:var(--green-dk)}
.chip.na{background:var(--navy-soft);color:var(--ink-2);font-weight:700}
.chip.gold{background:var(--gold-soft);color:var(--gold)}
.chip.lbl{background:var(--navy-soft);color:var(--ink-2);font-weight:700}
.badge{font-size:9px;font-weight:800;letter-spacing:.6px;padding:2.5px 8px;border-radius:12px;background:var(--gold-soft);color:var(--gold);text-transform:uppercase;cursor:help;display:inline-flex;align-items:center;gap:5px;outline:none}
.imark{display:inline-block;font-size:9.5px;font-weight:800;font-style:italic;line-height:1;opacity:.75;letter-spacing:.5px}
.imark{color:var(--ink-3);cursor:help;margin-left:5px;vertical-align:middle;outline:none}
.badge:hover,.badge:focus,.imark:hover,.imark:focus{filter:brightness(.92)}
.tipbox{position:absolute;z-index:999;background:#111827;color:#F3F4F6;font-size:11.5px;line-height:1.55;
  padding:10px 12px;border-radius:9px;box-shadow:0 8px 26px rgba(17,24,39,.28);pointer-events:none;font-weight:500}
/* rich chart hover card: header + big value + sub-line, with a series colour dot */
.tipbox.tt{padding:9px 11px 10px;min-width:118px;max-width:270px;border:1px solid rgba(255,255,255,.08)}
.tipbox.tt .tt-h{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#C3CAD9}
.tipbox.tt .tt-dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto;box-shadow:0 0 0 2px rgba(255,255,255,.12)}
.tipbox.tt .tt-v{font-size:18px;font-weight:800;color:#fff;margin-top:4px;letter-spacing:-.3px;line-height:1.1}
.tipbox.tt .tt-s{font-size:10.5px;color:#AAB2C4;margin-top:3px;font-weight:600}
.badge.red{background:var(--red-soft);color:var(--red-dk)}
.ok{color:var(--green);font-weight:800}
.warn{color:var(--gold);font-weight:800}
.ch{position:relative;width:100%;overflow-x:auto}
.ch svg{display:block}
.ch::-webkit-scrollbar{height:9px}
.ch::-webkit-scrollbar-thumb{background:#C7CCD6;border-radius:6px}
.ch::-webkit-scrollbar-track{background:#EFF1F4}
.chslide{font-size:9.5px;color:var(--ink-3);text-align:center;margin-top:1px}
.tblwrap{overflow-x:auto;max-width:100%}
/* ---- swatches, buttons, column list, export panel ---- */
.swatch{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:7px;vertical-align:middle}
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);color:var(--ink);
  font:inherit;font-size:12px;font-weight:700;padding:8px 14px;border-radius:9px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.btn:hover{border-color:var(--accent);box-shadow:0 1px 6px rgba(16,24,40,.07)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.btn.primary:hover{filter:brightness(.96)}
#btnReset{padding:8px 12px;font-size:12px;font-weight:700;border-radius:9px;color:var(--ink-3)}
#btnReset.active{border-color:var(--accent);color:var(--accent-dk);background:var(--accent-soft)}
#btnReset.active svg{color:var(--accent-dk)}
.btn.big{padding:11px 18px;font-size:13px;border-radius:10px}
.btn svg{flex:0 0 auto}
.collist{border:1px solid var(--line);border-radius:10px;overflow:hidden;max-height:430px;overflow-y:auto}
.colrow{display:flex;align-items:center;gap:11px;padding:9px 12px;font-size:12.5px;cursor:pointer;
  border-bottom:1px solid var(--line);background:var(--card);user-select:none;transition:background .1s}
.colrow:last-child{border-bottom:0}
.colrow:hover{background:#F7F9FC}
.colrow.on{background:var(--accent-soft)}
.colrow .box{width:17px;height:17px;border-radius:5px;border:1.5px solid #C6CCD8;display:inline-flex;
  align-items:center;justify-content:center;flex:0 0 auto;background:#fff;color:var(--accent-ink)}
.colrow.on .box{background:var(--accent);border-color:var(--accent)}
.colrow .cname{flex:1}
.colrow.on .cname{font-weight:700}
.colrow .cnum{font-size:10px;color:var(--ink-3);font-variant-numeric:tabular-nums}
.collist::-webkit-scrollbar{width:10px}
.collist::-webkit-scrollbar-thumb{background:#C7CCD6;border-radius:6px;border:2px solid #fff}
.expbox{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px dashed var(--line);
  border-radius:10px;background:#FBFCFE;margin-bottom:6px;flex-wrap:wrap}
.expfig{display:flex;flex-direction:column;line-height:1.15}
.expfig b{font-size:24px;font-weight:800;color:var(--ink)}
.expfig span{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3);font-weight:700}
.expx{font-size:16px;color:var(--ink-3)}
.expfile{display:flex;align-items:center;gap:7px;margin-left:auto;color:var(--ink-2);font-size:11.5px;font-weight:600}
.card h4 svg{opacity:.7}
.rawscroll{max-height:560px;overflow:auto;border:1px solid var(--line);border-radius:10px}
.rawscroll table{border-collapse:separate;border-spacing:0}
.rawscroll thead th{position:sticky;top:0;z-index:2;background:var(--navy);color:#fff;box-shadow:0 1px 0 var(--line)}
.rawscroll::-webkit-scrollbar{width:11px;height:11px}
.rawscroll::-webkit-scrollbar-thumb{background:#B9C0CD;border-radius:7px;border:2px solid #fff}
.rawscroll::-webkit-scrollbar-track{background:#F1F3F7}
.step{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.stepn{width:24px;height:24px;border-radius:50%;background:var(--accent);color:var(--accent-ink);
  display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex:0 0 auto}
.steph{font-size:13px;font-weight:800;color:var(--ink)}
.steps{font-size:11px;color:var(--ink-3);margin-left:auto}
.dscard{display:flex;flex-direction:column;gap:3px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
  cursor:pointer;background:var(--card);transition:border-color .12s,box-shadow .12s}
.dscard:hover{border-color:var(--accent)}
.dscard.on{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 1px 6px rgba(16,24,40,.06)}
.dscard b{font-size:12.5px}
.dscard span{font-size:10.5px;color:var(--ink-3)}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;color:var(--ink)}
.tbl th{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-2);text-align:right;padding:8px 10px;border-bottom:2px solid var(--line);white-space:nowrap;font-weight:800}
.tbl th:first-child,.tbl td:first-child{text-align:left}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.tbl tr:last-child td{border-bottom:0}
.tbl tr.tot td{font-weight:800;background:var(--navy-soft);border-top:2px solid var(--ink-2)}
.tbl td.name{font-weight:700}
.tbl.wrap td{white-space:normal}
.pos{color:var(--red-dk);font-weight:800}
.neg{color:var(--green-dk);font-weight:800}
.mut{color:var(--ink-3)}
.selrow{display:flex;gap:7px;flex-wrap:nowrap;overflow-x:auto;margin:2px 0 16px;padding-bottom:4px;scrollbar-width:thin}
.selrow .sc{padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card);font-size:11.5px;font-weight:700;color:var(--ink-2);cursor:pointer;transition:all .12s;white-space:nowrap;flex:0 0 auto}
.selrow .sc:hover{border-color:var(--accent);color:var(--accent-dk)}
.selrow .sc.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.selrow .gap{min-width:10px}
.selrow .glab{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--on-dark-2);align-self:center;font-weight:800;white-space:nowrap}
.tk{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px dashed var(--line);font-size:12.5px;line-height:1.5}
.tk:last-child{border-bottom:0}
/* What to watch — clickable rows that jump to the page holding the detail */
.watch{display:flex;gap:11px;align-items:flex-start;padding:10px 10px 10px 11px;border-radius:9px;border:1px solid var(--line);
  margin-bottom:8px;cursor:pointer;background:#fff;transition:border-color .12s,box-shadow .12s,transform .12s;text-align:left;width:100%;font:inherit}
.watch:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(31,42,68,.07);transform:translateY(-1px)}
.watch .wdot{min-width:8px;height:8px;border-radius:50%;margin-top:6px;background:var(--ink-3)}
.watch .wdot.up{background:var(--red)} .watch .wdot.dn{background:var(--green)} .watch .wdot.flag{background:var(--gold)}
/* Need to take action — red-flag list; severity sets the left edge */
.actioncard{border-left:3px solid var(--red)}
.actioncard h4{color:var(--red-dk)}
.watch.act.high{border-left:3px solid var(--red)}
.watch.act.med{border-left:3px solid var(--gold)}
.actionclear{display:flex;gap:10px;align-items:center;font-size:12.5px;color:var(--green-dk);font-weight:600;padding:6px 2px}
.actionclear svg{color:var(--green)}
.watch .wtx{flex:1;font-size:12.5px;line-height:1.55;color:var(--ink)}
.watch .wsub{display:block;font-size:11px;line-height:1.5;color:var(--ink-3);margin-top:3px;font-weight:500}
.watch .wgo{font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);white-space:nowrap;margin-top:2px}
.tk .dot{min-width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:6px}
.tk .dot.up{background:var(--red)}
.tk .dot.dn{background:var(--green)}
.note{font-size:10.5px;color:var(--ink-3);margin-top:8px;line-height:1.5}
.mini{font-size:11px;color:var(--ink-2);line-height:1.6}
.section-h{display:flex;align-items:baseline;gap:10px;margin:26px 0 12px}
.section-h h5{font-size:14px;font-weight:800;letter-spacing:.2px;color:var(--on-dark)}
.section-h .ln{flex:1;height:1px;background:var(--dark-line)}
.section-h .mini{color:var(--on-dark-2)}
.guide-h{font-size:13px;font-weight:800;margin:0 0 8px;color:var(--ink)}
.dev{padding:56px 24px;text-align:center}
.dev .devic{margin-bottom:14px;color:var(--ink-3)}
.dev h3{font-size:20px;font-weight:800;margin-bottom:8px;color:var(--ink)}
.dev p{font-size:12.5px;color:var(--ink-2);max-width:560px;margin:0 auto 6px;line-height:1.6}
footer{padding:18px 28px;font-size:10.5px;color:var(--on-dark-3);border-top:1px solid var(--dark-line);text-align:center}
/* ---------------- interactive drill-down + legend toggle ---------------- */
.ch g.drill{cursor:pointer}
.ch g.drill:hover rect,.ch g.drill:hover path{opacity:.72}
.ch g.leg{cursor:pointer}
.ch g.leg:hover text{fill:var(--accent-dk)}
.drill-hint{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:800;letter-spacing:.2px;text-transform:none;color:var(--accent-dk);background:var(--accent-soft);padding:2px 8px;border-radius:20px}
.leg-hint{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:800;letter-spacing:.2px;text-transform:none;color:var(--ink-2);background:var(--navy-soft);padding:2px 8px;border-radius:20px}
/* ---- user guide ---- */
.gtop{display:flex;align-items:center;gap:18px;background:linear-gradient(135deg,#12213F 0%,#1D3564 60%,#26407A 100%);border-radius:14px;padding:20px 24px;margin-bottom:18px;color:#fff}
.gtop-l{flex:1;min-width:0}
.gtop-k{font-size:10px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:#9DB4E0;margin-bottom:6px}
.gtop-t{font-size:19px;font-weight:800;letter-spacing:-.2px;margin-bottom:7px}
.gtop-f{font-size:12px;line-height:1.6;color:#C9D8F2}
.gtop-f b{color:#fff}
.gtop-r{text-align:right;flex:0 0 auto;padding-left:18px;border-left:1px solid rgba(255,255,255,.16)}
.gtop-n{font-size:32px;font-weight:800;color:var(--accent);line-height:1}
.gtop-u{font-size:10.5px;font-weight:700;color:#9DB4E0;margin-top:5px;letter-spacing:.04em}
.card.step{position:relative;padding-top:22px;display:block}
.readnum,.card.srccard{display:block}
.step-n{position:absolute;top:-11px;left:18px;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.14)}
.step-h{font-size:13.5px;font-weight:800;color:var(--ink);margin-bottom:8px}
.step-b{font-size:12px;line-height:1.72;color:var(--ink-2)}
.step-t{margin-top:11px;padding-top:9px;border-top:1px dashed var(--line);font-size:10.5px;font-weight:700;color:var(--ink-3);display:flex;align-items:center;gap:6px}
.nvrow{display:flex;gap:9px;align-items:baseline;padding:3.5px 0}
.nvk{flex:0 0 96px;font-weight:800;color:var(--ink);font-size:11.5px}
.nvv{color:var(--ink-2);font-size:11.5px}
.readnum{margin-top:14px}
.rn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.rn{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink-2);background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
.srcrow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px}
.src{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
.src-f{font-size:12px;font-weight:800;color:var(--ink)}
.src-d{font-size:11px;color:var(--ink-2);margin-top:3px}
.fileref{font-weight:800;color:var(--accent-dk)}
.kpibox{max-height:340px;overflow-y:auto;border:1px solid var(--line);border-radius:9px}
.kpibox table{margin:0}

const lmIdx = () => { const i=mi(S.month); return (i>=0 && LM.has[i]) ? i : LM_LAST; };   /* newest month that has last-mile data */

/* ---------------------------------------------------------------------------

let LM_LAST = -1; LM.has.forEach((v,i)=>{ if(v && i<=LAST) LM_LAST=i; });

const SRC_TIP  = {

const lmFC_LMD  = LM.ok ? LM.fc.cost  : M.map(_=>0);

/* ===================== TOTAL SCM COST — THE ONE FORMULA =====================
   Total SCM = B2B (Distribution Center + Mid-Mile) + B2C (FC Operation + Last-Mile)
     · Distribution Center cost INCLUDES TFRS16  ("Total Warehouse cost" + "Warehouse (TFRS16)")
     · Last-Mile is the WHOLE delivery operation from LMD Cost Data.xlsb:
       FC + Store + Local  ("Cost (Store+FC+Local)")
     · The FC P&L "− Last mile" line is DELIBERATELY EXCLUDED from this formula,
       so the FC delivery is counted once only — from the LMD file.
       FC Operation is already net of it (P&L: Operation = Total Cost − Last mile),
       so nothing is double-counted and nothing is missed.
   Jun-26: 215.88 + 271.34 + 47.70 + 283.40 = 818.32 MB
   ========================================================================= */
const SEG = {
  b2bWH:  add(dcWH('Dry'), dcWH('Fresh')),      /* DC Operation — TFRS16 INCLUDED */
  midMile:add(dcMB('Dry','transport'), dcMB('Fresh','transport')),
  fcOp:   sumFC('op'),                          /* FC operation, already excl. its own last-mile */
  lastMile: LM.ok ? LM.cost : M.map(_=>0),      /* LMD: FC + Store + Local */
  lmNet:  LM.ok ? LM.cost : M.map(_=>0),
};
Object.defineProperty(SEG,'lmFC',{get(){ return lmFCArr(); }});   /* FC P&L view — reference only, NOT in Total SCM */
SEG.total = M.map((_,i)=> SEG.b2bWH[i]+SEG.midMile[i]+SEG.fcOp[i]+(SEG.lastMile[i]||0));
SEG.b2c   = M.map((_,i)=> SEG.fcOp[i]+(SEG.lastMile[i]||0));
/* months where the LMD file has no data carry no last-mile — flagged, never silently zeroed */
const lmMissing = i => !LM.ok || !LM.has[i];
SEG.b2b   = M.map((_,i)=> SEG.b2bWH[i]+SEG.midMile[i]);
const FC_START = mi('2026-01');   // FC data begins
/* Total SCM has one fixed definition; the whole delivery operation lives on the
   Last-Mile page. Kept as a constant so the wording stays identical everywhere. */
const SCOPE_TXT = { FC:'Total SCM = B2B (Distribution Center incl. TFRS16 + Mid-Mile) + B2C (FC Operation + Last-Mile). Last-Mile is the whole delivery operation from the LMD file — FC + Store + Local. The FC P&L last-mile line is excluded from this formula so FC delivery is counted once only.' };
const TOTAL_TXT = SCOPE_TXT.FC;

/* ---------- state ---------- */
const S = { page:'summary', month: M[LAST], mode:'M', dc:'OVERVIEW', fc:'OVERVIEW', lm:'OVERVIEW', scope:'FC', src:'PNL' };
/* scope is fixed: Total SCM always = DC Operation + Mid-Mile + FC Operation + FC last-mile.
   The whole delivery operation (Store + FC + Local) lives on the Last-Mile page. */

/* ---------- period helpers (Monthly vs YTD) ---------- */
function periodIdx(){ const i=mi(S.month); if(S.mode==='M') return [i];
  const y=S.month.split('-')[0]; const out=[]; for(let k=0;k<=i;k++) if(M[k].startsWith(y)) out.push(k); return out; }
function pSum(arr){ return periodIdx().reduce((a,k)=>a+(arr[k]||0),0); }
function pPrev(arr){                       // comparison basis: prev month, or same period LY for YTD
  const i=mi(S.month);
  if(S.mode==='M') return i>0 ? arr[i-1] : null;
  const idx=periodIdx().map(k=>k-12).filter(k=>k>=0);
  if(!idx.length) return null; const v=idx.reduce((a,k)=>a+(arr[k]||0),0); return v||null;
}
function pYoY(arr){ const i=mi(S.month); if(S.mode!=='M') return null; return i>=12 && arr[i-12] ? arr[i-12] : null; }
const modeLbl = ()=> S.mode==='M' ? label(S.month) : 'YTD Jan–'+label(S.month).split(' ')[0]+' '+S.month.split('-')[0];
const cmpLbl  = ()=> S.mode==='M' ? 'MoM' : 'vs YTD LY';

/* ---------- formatting ---------- */
const fmt  = (v,d=1) => v==null||isNaN(v) ? '–' : v.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fMB  = v => fmt(v,1);
const fPct = v => v==null||!isFinite(v) ? 'n/a' : (v>0?'+':'')+ (v*100).toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
/* delta chips: the ONLY place red/green appear — red = cost up (bad), green = cost down (good).
   invert=true for volume/utilization metrics where up = good. */
/* A delta chip can jump to the period it is comparing against: click a MoM chip to
   open the previous month, a YoY chip to open the same month last year. Works on every
   page because every card builds its chips through chip(). Monthly mode only. */
function chipNav(lbl){
  if(S.mode!=='M') return null;
  const i=mi(S.month);
  if(lbl==='MoM' && i>0   && MONTHS.indexOf(M[i-1])>=0)  return {m:M[i-1],  note:'previous month'};
  if(lbl==='YoY' && i>=12 && MONTHS.indexOf(M[i-12])>=0) return {m:M[i-12], note:'same month last year'};
  return null;
}
function chip(cur, base, lbl, invert=false){
  if(base==null || !base || cur==null) return `<span class="chip na">${lbl}: n/a</span>`;
  const d=cur/base-1; const bad = invert ? d<0 : d>0;
  const cls = Math.abs(d)<1e-4 ? 'na' : (bad?'up':'dn');
  const ar  = Math.abs(d)<1e-4 ? '•' : (d>0?'▲':'▼');
  const nav = chipNav(lbl);
  if(nav) return `<span class="chip ${cls} clk" onclick="event.stopPropagation();setMonth('${nav.m}')" title="View ${label(nav.m)} — ${nav.note}">${ar} ${fPct(d)} ${lbl}</span>`;
  return `<span class="chip ${cls}">${ar} ${fPct(d)} ${lbl}</span>`;
}
/* ---------- signals: badge + hover explanation ----------
   Every badge carries its full explanation in data-tip; tipInit() renders it as
   a readable panel on hover (and on tap), so a signal is never just a symbol. */
const esc0 = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const badge=(txt,tip,red=false)=>`<span class="badge${red?' red':''}" data-tip="${esc0(tip)}" tabindex="0">${txt}</span>`;
/* info marker for any label that needs a note (units, sources, definitions) */
const info = tip => `<span class="imark" data-tip="${esc0(tip)}" tabindex="0">i</span>`;
let TIPBOX=null;
function tipInit(){
  try{
    if(TIPBOX || typeof document==='undefined' || !document.body || !document.createElement) return;
    TIPBOX=document.createElement('div'); TIPBOX.className='tipbox'; TIPBOX.style.display='none';
    document.body.appendChild(TIPBOX);
    /* rich chart card floats next to the cursor and flips to stay on-screen */
    const atCursor=(x,y)=>{ const w=TIPBOX.offsetWidth||160, h=TIPBOX.offsetHeight||44;
      let L=x+15, T=y+18;
      if(L+w > window.innerWidth-8)  L=x-w-15;
      if(T+h > window.innerHeight-8) T=y-h-18;
      TIPBOX.style.left=Math.max(8,L)+window.scrollX+'px';
      TIPBOX.style.top =Math.max(8,T)+window.scrollY+'px'; };
    /* plain text tip (badges / info markers) sits just below its element */
    const belowEl=(el)=>{ const r=el.getBoundingClientRect(), w=Math.min(340, window.innerWidth-24);
      TIPBOX.style.maxWidth=w+'px';
      TIPBOX.style.left=Math.max(10, Math.min(window.innerWidth-w-10, r.left+window.scrollX))+'px';
      TIPBOX.style.top=(r.bottom+window.scrollY+8)+'px'; };
    const show=(el,e)=>{
      const rich=el.getAttribute('data-tt');
      if(rich!=null){
        const val=el.getAttribute('data-tv')||'', sub=el.getAttribute('data-ts')||'', col=el.getAttribute('data-tc')||'';
        TIPBOX.className='tipbox tt'; TIPBOX.style.maxWidth='';
        TIPBOX.innerHTML=`<div class="tt-h">${col?`<span class="tt-dot" style="background:${col}"></span>`:''}${esc(rich)}</div>`
          +(val?`<div class="tt-v">${esc(val)}</div>`:'')+(sub?`<div class="tt-s">${esc(sub)}</div>`:'');
        TIPBOX.style.display='block';
        if(e && e.clientX!=null) atCursor(e.clientX,e.clientY); else belowEl(el);
      } else {
        const tp=el.getAttribute('data-tip'); if(!tp) return;
        TIPBOX.className='tipbox'; TIPBOX.textContent=tp; TIPBOX.style.display='block'; belowEl(el);
      }
    };
    const hide=()=>{ if(TIPBOX) TIPBOX.style.display='none'; };
    const find=n=>{ while(n && n.getAttribute){ if(n.getAttribute('data-tt')!=null || n.getAttribute('data-tip')) return n; n=n.parentElement; } return null; };
    document.addEventListener('mouseover', e=>{ const el=find(e.target); if(el) show(el,e); });
    document.addEventListener('mousemove', e=>{ if(!TIPBOX || TIPBOX.style.display==='none') return;
      const el=find(e.target); if(!el){ hide(); return; }
      if(el.getAttribute('data-tt')!=null) atCursor(e.clientX,e.clientY); });
    document.addEventListener('mouseout', e=>{ if(!find(e.relatedTarget)) hide(); });
    document.addEventListener('focusin',  e=>{ const el=find(e.target); if(el) show(el,null); });
    document.addEventListener('focusout', hide);
    document.addEventListener('click',    e=>{ const el=find(e.target); if(el && el.getAttribute('data-tip')) show(el,null); });
    window.addEventListener('scroll', hide, {passive:true});
  }catch(_){ /* headless: no DOM — tooltips are a browser-only nicety */ }
}

/* ---------- KPI card ---------- */
function kpi({title, val, unit, sub, chips=[], hero=false, badge:bd=''}){
  return `<div class="card ${hero?'hero':''}">
    <h4>${title}${bd}</h4>
    <div class="${hero?'big':'kv'}"><b>${val}</b> <span class="unit">${unit||''}</span></div>
    ${sub?`<div class="sub">${sub}</div>`:''}
    ${chips.length?`<div class="chips">${chips.join('')}</div>`:''}
  </div>`;
}

/* ======================================================================
   BUILT-IN SVG CHART ENGINE
   Consumes Chart.js-style configs used by the pages:
     type: 'bar' | 'line' | 'doughnut'
     data: { labels:[], datasets:[{ label, data, backgroundColor (str|arr),
             borderColor, stack, type:'line' (override in bar charts),
             yAxisID:'y'|'y2', borderRadius, dl:{fmt,mode:'all'|'last'},
             dec, suffix }] }
     options: { indexAxis:'y', plugins:{ legend:{display,position},
               stackTotals:{fmt} }, scales:{ y:{title}, y2:{} } }
   Extras: value labels (dl), stack totals, native <title> tooltips.
   ====================================================================== */
const FONT_STACK = '-apple-system,Segoe UI,Roboto,Prompt,sans-serif';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const nz  = v => (v==null || isNaN(v)) ? null : +v;

function niceTicks(min, max, n=5){
  if(min===max){ max=min+1; }
  const span=max-min, step0=span/n, mag=Math.pow(10,Math.floor(Math.log10(step0)));
  const norm=step0/mag; let step;
  if(norm<1.5) step=1; else if(norm<3) step=2; else if(norm<7) step=5; else step=10;
  step*=mag;
  const lo=Math.floor(min/step)*step, hi=Math.ceil(max/step)*step;
  const ticks=[]; for(let t=lo;t<=hi+step*0.001;t+=step) ticks.push(+t.toFixed(10));
  return {lo, hi, ticks};
}
const tickFmt = (v, span) => span>=200? fmt(v,0) : (span>=20? fmt(v,0) : (span>=2? fmt(v,1) : fmt(v,2)));
function txt(x,y,s,{size=9.5,color=C.ink2,anchor='middle',weight=600,base='auto'}={}){
  return `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" font-size="${size}" fill="${color}" text-anchor="${anchor}" font-weight="${weight}" dominant-baseline="${base}" font-family="${FONT_STACK}">${esc(s)}</text>`;
}
/* Rich hover card: returns ATTRIBUTES placed on a chart shape (rect/circle/path).
   tipInit() reads them and renders a small floating card that follows the cursor —
   header (with a colour dot for the series), a big value, and a muted sub-line. */
function tip(name, val, sub, color){
  const a = s => esc0(String(s==null ? '' : s));
  return ` data-tt="${a(name)}" data-tv="${a(val)}"${sub?` data-ts="${a(sub)}"`:''}${color?` data-tc="${a(color)}"`:''}`;
}
const jsq = s => String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");   /* safe single-quoted onclick arg */

function legendRow(dss, W, id, hid){
  const items = dss.filter(d=>d.label);
  if(!items.length) return {h:0, svg:''};
  let x=W-10, parts=[];
  [...items].reverse().forEach(d=>{
    const w = String(d.label).length*5.9 + 18;
    x -= w;
    const col = d.legendColor || (typeof d.backgroundColor==='string'? d.backgroundColor : d.borderColor) || d.borderColor || C.navy;
    const off = !!(hid && hid[d.label]);
    let g = id? `<g class="leg" onclick="toggleSeries('${jsq(id)}','${jsq(d.label)}')" opacity="${off?0.34:1}">` : `<g opacity="${off?0.34:1}">`;
    g += `<circle cx="${x+4}" cy="9" r="4" fill="${col}"/>`+txt(x+12,10,d.label,{anchor:'start',size:9.5,weight:700,base:'middle'});
    if(off) g += `<line x1="${x}" y1="9.5" x2="${(x+w-9).toFixed(1)}" y2="9.5" stroke="${C.ink2}" stroke-width="1.2"/>`;
    parts.push(g+`</g>`);
  });
  return {h:20, svg:parts.join('')};
}

function renderAxisChart(cfg, W, H, id){
  const data=cfg.data, opts=cfg.options||{}, horiz=opts.indexAxis==='y';
  const labels=data.labels||[], n=labels.length;
  const dssAll=data.datasets||[];
  const hid = id? HIDDEN[id] : null;
  const dss = dssAll.filter(d=>!(hid && d.label && hid[d.label]));   /* legend toggle: hidden series are not drawn */
  const stackTotals = opts.plugins && opts.plugins.stackTotals;
  const legendOff = opts.plugins && opts.plugins.legend && opts.plugins.legend.display===false;
  const leg = legendOff? {h:4,svg:''} : legendRow(dssAll, W, id, hid);
  const sc0 = opts.scales||{};
  const yT=(sc0.y&&sc0.y.title&&sc0.y.title.text)||'', xT=(sc0.x&&sc0.x.title&&sc0.x.title.text)||'', y2T=(sc0.y2&&sc0.y2.title&&sc0.y2.title.text)||'';
  const isLine = d => (d.type||cfg.type)==='line';
  const stacked = dss.some(d=>d.stack && !isLine(d));
  const hasY2 = dss.some(d=>d.yAxisID==='y2');

  /* domains */
  function domain(axis){
    let lo=0, hi=0;
    if(stacked && axis==='y'){
      for(let i=0;i<n;i++){ let p=0,q=0;
        dss.forEach(d=>{ if(isLine(d)||((d.yAxisID||'y')!==axis)) return; const v=nz(d.data[i]); if(v==null)return; if(v>=0)p+=v; else q+=v; });
        hi=Math.max(hi,p); lo=Math.min(lo,q); }
      dss.forEach(d=>{ if(!isLine(d)||((d.yAxisID||'y')!==axis)) return; d.data.forEach(v=>{v=nz(v); if(v==null)return; hi=Math.max(hi,v); lo=Math.min(lo,v);}); });
    } else {
      dss.forEach(d=>{ if((d.yAxisID||'y')!==axis) return; d.data.forEach(v=>{ v=nz(v); if(v==null)return; hi=Math.max(hi,v); lo=Math.min(lo,v); }); });
    }
    if(hi===0 && lo===0) hi=1;
    const cfgAx = (opts.scales && opts.scales[axis]) || {};
    if(cfgAx.max!=null || cfgAx.min!=null){          /* fixed scale, e.g. a 0-100% stack */
      const lo2 = cfgAx.min!=null? cfgAx.min : Math.min(0,lo);
      const hi2 = cfgAx.max!=null? cfgAx.max : hi;
      return niceTicks(lo2, hi2, 5);
    }
    const head=(hi-lo)*(stackTotals||dss.some(d=>d.dl)?0.14:0.08);
    return niceTicks(lo, hi+head, 5);
  }
  const dy=domain('y'), dy2=hasY2? domain('y2') : null;

  /* layout */
  const padL = (horiz? 96 : 46) + (yT?15:0), padR = (hasY2? 48 : 16) + (y2T?14:0), padT = leg.h+10, padB = (horiz? 8 : 22) + (xT?14:0);
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const sy  = v => padT + plotH - (v-dy.lo)/(dy.hi-dy.lo)*plotH;
  const sy2 = dy2? (v => padT + plotH - (v-dy2.lo)/(dy2.hi-dy2.lo)*plotH) : null;
  const sx  = v => padL + (v-dy.lo)/(dy.hi-dy.lo)*plotW;      /* horiz value axis */
  let out=[];

  /* grid + ticks (axes may show up to 2 decimals when the tick step is fractional) */
  const tdec = tk=>{ const s=tk.length>1? Math.abs(tk[1]-tk[0]) : 1; return s>=1?0:(s>=0.1?1:2); };
  const dD=tdec(dy.ticks), d2D=dy2?tdec(dy2.ticks):0;
  if(horiz){
    dy.ticks.forEach(t=>{ const x=sx(t);
      out.push(`<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT+plotH}" stroke="#EFEFF3"/>`);
      out.push(txt(x, padT+plotH+14, fmt(t,dD)));
    });
  } else {
    dy.ticks.forEach(t=>{ const y=sy(t);
      out.push(`<line x1="${padL}" y1="${y}" x2="${padL+plotW}" y2="${y}" stroke="#EFEFF3"/>`);
      out.push(txt(padL-6, y+3, fmt(t,dD), {anchor:'end'}));
    });
    if(dy2) dy2.ticks.forEach(t=>{ const y=sy2(t); out.push(txt(padL+plotW+6, y+3, fmt(t,d2D), {anchor:'start'})); });
  }
  /* axis unit labels */
  if(yT) out.push(txt(padL-6, padT-4, yT, {anchor:'end', size:9, weight:800, color:C.ink2}));
  if(y2T) out.push(txt(padL+plotW+6, padT-4, y2T, {anchor:'start', size:9, weight:800, color:C.ink2}));
  if(xT) out.push(txt(padL+plotW/2, H-2, xT, {size:9.5, weight:800, color:C.ink2}));

  const band = (horiz? plotH : plotW)/Math.max(n,1);
  const bandPos = i => (horiz? padT : padL) + band*i + band/2;
  /* category labels */
  if(horiz){
    labels.forEach((l,i)=> out.push(txt(padL-6, bandPos(i)+3, l, {anchor:'end', size:9.5})));
  } else {
    const xf = n>14? 8.5 : 9.5;
    labels.forEach((l,i)=> out.push(txt(bandPos(i), padT+plotH+14, l, {size:xf})));
  }

  /* bars */
  const barDss = dss.filter(d=>!isLine(d));
  const groups = stacked? 1 : Math.max(barDss.length,1);
  const bw = Math.max(band*0.62/groups, 2);
  const cum = labels.map(()=>({p:0,q:0}));
  const BARPOS = {};        /* BARPOS[gi][i] = {cx, cy, thick, span} — centre of the drawn segment */
  barDss.forEach((d,gi)=>{
    BARPOS[gi] = BARPOS[gi] || {};
    const fillOf = i => Array.isArray(d.backgroundColor)? d.backgroundColor[i] : (d.backgroundColor||C.navy);
    for(let i=0;i<n;i++){
      const v=nz(d.data[i]); if(v==null||v===0) continue;
      let a,b;   /* value extent */
      if(stacked && d.stack){ if(v>=0){ a=cum[i].p; b=cum[i].p+v; cum[i].p=b; } else { b=cum[i].q; a=cum[i].q+v; cum[i].q=a; } }
      else { a=Math.min(0,v); b=Math.max(0,v); }
      const dr = d.drill ? (typeof d.drill==='function' ? d.drill(i) : (Array.isArray(d.drill)? d.drill[i] : d.drill)) : null;
      const gO = dr ? `<g class="drill" onclick="${dr}">` : `<g>`;   /* drill-down: pointer + onclick when a target is defined */
      let denom=0; if(stacked){ barDss.forEach(dd=>{ const vv=nz(dd.data[i]); if(vv!=null) denom+=Math.abs(vv); }); } else { d.data.forEach(vv=>{ vv=nz(vv); if(vv!=null) denom+=Math.abs(vv); }); }
      /* share = this value ÷ the denominator, named explicitly so the card says
         what it is a share OF: a stacked segment is a share of that column's total;
         a plain/ranked bar is a share of the total across all bars. A chart may pass
         opts.shareOf to name the whole (e.g. "Total SCM"). */
      const pct = denom>0? (Math.abs(v)/denom*100).toFixed(1) : null;
      const cat = d.label ? labels[i] : '';
      let shareTok = '';
      if(pct!=null && !opts.noShare){
        if(opts.shareOf) shareTok = `${pct}% of ${opts.shareOf}`;
        else if(stacked) shareTok = `${pct}% of ${labels[i]} total`;   /* segment ÷ this column's total */
        /* A plain (non-stacked) bar's share of its whole series is rarely meaningful —
           e.g. one month as a % of the year — so it is shown ONLY when a chart names the
           whole via opts.shareOf (the rankings do). Trends therefore show no share. */
      }
      const subParts = [];
      if(cat && shareTok.indexOf(cat)<0) subParts.push(cat);
      if(shareTok) subParts.push(shareTok);
      if(dr) subParts.push('click to open ›');
      const t=tip(d.label || labels[i], fmt(v, d.dec!=null?d.dec:1)+(d.suffix||''), subParts.join(' · '), fillOf(i));
      if(horiz){
        const y = bandPos(i) - bw/2;
        const x0=sx(a), x1=sx(b);
        out.push(`${gO}<rect x="${Math.min(x0,x1).toFixed(1)}" y="${y.toFixed(1)}" width="${Math.abs(x1-x0).toFixed(1)}" height="${bw.toFixed(1)}" rx="2.5" fill="${fillOf(i)}" stroke="${d.borderColor||'none'}" stroke-width="${d.borderColor?1:0}"${t}></rect></g>`);
        BARPOS[gi][i] = {cx:(x0+x1)/2, cy:bandPos(i), end:Math.max(x0,x1), span:Math.abs(x1-x0), thick:bw};
      } else {
        const x = bandPos(i) - (stacked? bw/2 : bw*groups/2 - gi*bw);
        const y0=sy(a), y1=sy(b);
        out.push(`${gO}<rect x="${x.toFixed(1)}" y="${Math.min(y0,y1).toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(Math.abs(y0-y1),0.8).toFixed(1)}" rx="2" fill="${fillOf(i)}" stroke="${d.borderColor||'none'}" stroke-width="${d.borderColor?1:0}"${t}></rect></g>`);
        BARPOS[gi][i] = {cx:x+bw/2, cy:(y0+y1)/2, top:Math.min(y0,y1), span:Math.abs(y0-y1), thick:bw};
      }
    }
  });

  /* ---------- value-label system: adaptive decimals + collision avoidance ----------
     adaptDec: if two neighbouring labels would print the same text while the raw
     values differ, add decimal places (up to 3) until they are distinguishable. */
  function adaptDec(vals, d0){
    let d = d0==null? 1 : d0;
    while(d<3){
      const f=vals.map(v=> v==null? null : fmt(v,d));
      let dup=false;
      for(let i=1;i<f.length;i++) if(f[i]!=null && f[i-1]!=null && f[i]===f[i-1] && vals[i]!==vals[i-1]) dup=true;
      if(!dup) break; d++;
    }
    return d;
  }
  const LQ=[];   /* label queue: {x,y,s,color,weight,size,anchor,prio} */
  const qLabel=(x,y,s,o={})=>LQ.push(Object.assign({x,y,s:String(s),color:C.ink2,weight:600,size:9.5,anchor:'middle',prio:1},o));

      const cx=L.anchor==='start'? L.x+w/2 : (L.anchor==='end'? L.x-w/2 : L.x);
      let y=L.y, ok=false;
      for(let t=0;t<3;t++){
        const clash=placed.some(p=> Math.abs(p.cx-cx)<(p.w+w)/2+2 && Math.abs(p.y-y)<10);
        if(!clash){ ok=true; break; }
        y-=11;                                /* nudge up, then give up (skip) */
      }
      if(L.force){ s+=txt(L.x,L.y,L.s,{color:L.color,weight:L.weight,size:L.size,anchor:L.anchor}); return; }
      if(ok && y>8){ placed.push({cx,y,w}); s+=txt(L.x,y,L.s,{color:L.color,weight:L.weight,size:L.size,anchor:L.anchor}); }
    });
    return s;
  }

  /* stack totals (placed first — highest priority) */
  if(stackTotals && !horiz){
    const totals = labels.map((_,i)=> barDss.reduce((a,d)=>a+(nz(d.data[i])||0),0));
    const dT = stackTotals.fmt? null : adaptDec(totals.map(v=>v||null), stackTotals.dec!=null? stackTotals.dec:0);
    for(let i=0;i<n;i++){
      if(!totals[i]) continue;
      const s = stackTotals.fmt? stackTotals.fmt(totals[i]) : fmt(totals[i], dT);
      qLabel(bandPos(i), sy(Math.max(cum[i].p,0))-4, s, {color:C.navy, weight:700, prio:0});

  }

  /* lines */
  dss.forEach(d=>{
    if(!isLine(d)) return;

    const pts=[];
    for(let i=0;i<n;i++){
      const v=nz(d.data[i]); if(v==null){ continue; }
      const x=bandPos(i), y=sc(v);

    }
    out.push(`<path d="${path}" fill="none" stroke="${d.borderColor||C.navy}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>`);
    pts.forEach(p=> out.push(`<g><circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.4" fill="${d.borderColor||C.navy}"${tip(d.label||labels[p.i], fmt(p.v, d.dec!=null?d.dec:1)+(d.suffix||''), d.label? labels[p.i] : '', d.borderColor||C.navy)}></circle></g>`));
  });

  /* value labels (dl) — queued, then collision-resolved */
  const barIndex = new Map(); barDss.forEach((d,k)=>barIndex.set(d,k));
  /* readable-on-fill: white text inside a dark segment, dark text on a light one */
  const lum = hex => { const m=/^#?([0-9a-f]{6})$/i.exec(String(hex)||''); if(!m) return 1;
    const n_=parseInt(m[1],16), r=(n_>>16)&255, g=(n_>>8)&255, b=n_&255;
    return (0.299*r+0.587*g+0.114*b)/255; };
  dss.forEach(d=>{
    if(!d.dl) return;
    const gi = barIndex.has(d) ? barIndex.get(d) : -1;
    const dd = d.dl.fmt? null : adaptDec(d.data.map(nz), d.dl.dec);
    const f = d.dl.fmt || (x=>fmt(x,dd));
    const li=(()=>{let k=-1; d.data.forEach((v,i)=>{ if(nz(v)!=null) k=i; }); return k;})();
    const sc=(d.yAxisID==='y2'&&sy2)? sy2 : sy;
    const fill = (typeof d.backgroundColor==='string')? d.backgroundColor : null;
    for(let i=0;i<n;i++){
      const v=nz(d.data[i]); if(v==null||(v===0&&isLine(d))) continue;
      if((d.dl.mode||'all')==='last' && i!==li) continue;
      const col=d.dl.color|| (isLine(d)? (d.borderColor||C.ink2) : C.ink2);
      const pos = (gi>=0 && BARPOS[gi]) ? BARPOS[gi][i] : null;
      if(isLine(d)){
        qLabel(bandPos(i), sc(v)-7, f(v), {color:col, weight:700, prio:1});
      } else if(stacked && d.stack && pos){
        /* inside the segment, centred both ways — only when the segment is big enough */
        const txt=f(v), need=txt.length*5.6;
        if(horiz ? (pos.span>need+8 && pos.thick>11) : (pos.span>13 && pos.thick>need*0.55)){
          const onDark = fill && lum(fill)<0.62;
          qLabel(pos.cx, pos.cy+3.4, txt, {color:onDark?'#FFFFFF':C.ink2, weight:700, prio:1, force:true});
        }
      } else if(horiz && pos){
        qLabel(pos.end+5, pos.cy+3.4, f(v), {anchor:'start', color:col, prio:1});
      } else if(pos){
        qLabel(pos.cx, pos.top-4, f(v), {color:col, prio:2});
      }
    }
  });
  /* average reference line (peer/time benchmark), drawn above the bars */
  const avgO = opts.plugins && opts.plugins.avg;
  if(avgO && avgO.value!=null && isFinite(avgO.value)){
    if(horiz){ const ax=sx(avgO.value); out.push(`<line x1="${ax.toFixed(1)}" y1="${padT}" x2="${ax.toFixed(1)}" y2="${(padT+plotH).toFixed(1)}" stroke="${C.avg}" stroke-width="1.5" stroke-dasharray="5 3"/>`); out.push(txt(ax, padT-3, avgO.label||'avg', {size:9, weight:800, color:C.avg})); }
    else { const ay=sy(avgO.value); out.push(`<line x1="${padL}" y1="${ay.toFixed(1)}" x2="${(padL+plotW).toFixed(1)}" y2="${ay.toFixed(1)}" stroke="${C.avg}" stroke-width="1.5" stroke-dasharray="5 3"/>`); out.push(txt(padL+plotW-2, ay-3, avgO.label||'avg', {anchor:'end', size:9, weight:800, color:C.avg})); }
  }

  return `<svg width="100%" height="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${leg.svg}${out.join('')}</svg>`;
}

function renderDoughnut(cfg, W, H, id){
  const d=cfg.data.datasets[0], labels=cfg.data.labels||[];
  const hid = id? HIDDEN[id] : null;
  const vis = labels.map(l=> !(hid && hid[l]));
  const raw=d.data.map(v=>Math.max(nz(v)||0,0));
  const vals=raw.map((v,i)=> vis[i]? v : 0);
  const tot=vals.reduce((a,b)=>a+b,0);
  const legH=18, cx=W/2, cy=(H-legH)/2+2;
  const R=Math.min(W,H-legH)/2-8, rin=R*0.58;
  let a0=-Math.PI/2, out=[];
  if(!tot){ out.push(txt(cx,cy,'no data',{size:11})); }
  vals.forEach((v,i)=>{
    if(!v) return;
    const frac=v/tot, a1=a0+frac*2*Math.PI, laf=frac>0.5?1:0;
    const p=(r,a)=>[cx+r*Math.cos(a), cy+r*Math.sin(a)];
    const [x0,y0]=p(R,a0), [x1,y1]=p(R,a1), [x2,y2]=p(rin,a1), [x3,y3]=p(rin,a0);
    const col=Array.isArray(d.backgroundColor)? d.backgroundColor[i] : d.backgroundColor;
    const dr = d.drill ? (typeof d.drill==='function' ? d.drill(i) : (Array.isArray(d.drill)? d.drill[i] : d.drill)) : null;
    const gO = dr ? `<g class="drill" onclick="${dr}">` : `<g>`;
    const arcWhole = (cfg.options && cfg.options.shareOf) || 'the total';
    out.push(`${gO}<path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${R} ${R} 0 ${laf} 1 ${x1.toFixed(1)} ${y1.toFixed(1)} L${x2.toFixed(1)} ${y2.toFixed(1)} A${rin} ${rin} 0 ${laf} 0 ${x3.toFixed(1)} ${y3.toFixed(1)} Z" fill="${col}"${tip(labels[i], fmt(raw[i],1)+(cfg.data.suffix||''), (frac*100).toFixed(1)+'% of '+arcWhole+(dr?' · click to open ›':''), col)}></path></g>`);
    if(frac>=0.07){ const am=(a0+a1)/2, rm=(R+rin)/2;
      out.push(txt(cx+rm*Math.cos(am), cy+rm*Math.sin(am)+3, (frac*100).toFixed(0)+'%', {color:'#fff', weight:800, size:10}));
    }
    a0=a1;
  });
  /* legend bottom (clickable to toggle a slice) */
  const items=labels.map((l,i)=>({l, i, col:Array.isArray(d.backgroundColor)?d.backgroundColor[i]:d.backgroundColor}));
  const wEach=items.map(it=>String(it.l).length*5.9+18);
  let x=cx - wEach.reduce((a,b)=>a+b,0)/2;
  items.forEach((it,i)=>{
    const off=!vis[it.i];
    let g = id? `<g class="leg" onclick="toggleSeries('${jsq(id)}','${jsq(it.l)}')" opacity="${off?0.34:1}">` : `<g opacity="${off?0.34:1}">`;
    g += `<circle cx="${x+4}" cy="${H-8}" r="4" fill="${it.col}"/>`+txt(x+11,H-7,it.l,{anchor:'start',base:'middle',weight:700});
    if(off) g += `<line x1="${x}" y1="${H-7.5}" x2="${(x+wEach[i]-10).toFixed(1)}" y2="${H-7.5}" stroke="${C.ink2}" stroke-width="1.1"/>`;
    out.push(g+`</g>`);
    x+=wEach[i];
  });
  return `<svg width="100%" height="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${out.join('')}</svg>`;
}

let CHARTS=[];                      /* kept for API compatibility */
const HIDDEN={};                    /* per-chart set of hidden series (legend toggle) */
const LASTCFG={};                   /* last config per chart id, so a legend toggle can re-render */
function killCharts(){ CHARTS=[]; }
function toggleSeries(id,label){    /* click a legend entry to exclude / restore that series */
  HIDDEN[id]=HIDDEN[id]||{}; HIDDEN[id][label]=!HIDDEN[id][label];
  if(LASTCFG[id]) mkChart(id, LASTCFG[id]);
}
/* setW: never let a style write throw. Element.style is always present in a
   browser, but is absent in headless test harnesses — and a throw inside the
   catch block below would escape mkChart and take down the whole page render. */
function setW(el, w){ try{ if(el && el.style) el.style.width = w; }catch(_){ } }
function mkChart(id, cfg){
  const el=document.getElementById(id); if(!el) return;
  LASTCFG[id]=cfg;
  try{
    const horiz = cfg.options && cfg.options.indexAxis==='y';
    const n = (cfg.data && cfg.data.labels)? cfg.data.labels.length : 0;
    const base = (el.parentElement && el.parentElement.clientWidth>50)? el.parentElement.clientWidth : ((el.clientWidth&&el.clientWidth>50)? el.clientWidth : 900);
    let W = base;

  r=Math.round(r+(255-r)*amt); g=Math.round(g+(255-g)*amt); b=Math.round(b+(255-b)*amt);

<script>

const WIN = 12;

/* unit-cost helpers (cost THB array, volume array) */
function unitNow(cost,vol){ const c=pSum(cost), v=pSum(vol); return v? c/v : null; }
function unitPrev(cost,vol){
  if(S.mode==='M'){ const i=mi(S.month); if(i<1) return null; return vol[i-1]? cost[i-1]/vol[i-1] : null; }
  const ii=periodIdx().map(k=>k-12).filter(k=>k>=0); if(!ii.length) return null;
  const c=ii.reduce((a,k)=>a+(cost[k]||0),0), v=ii.reduce((a,k)=>a+(vol[k]||0),0); return v? c/v : null;
}
function unitYoY(cost,vol){ if(S.mode!=='M') return null; const i=mi(S.month); if(i<12) return null; return vol[i-12]? cost[i-12]/vol[i-12] : null; }
const unitArr = (cost,vol) => M.map((_,i)=> vol[i]? cost[i]/vol[i] : null);

const BADGES = {
  fc406: badge('data check','P&L block for FC406 currently shows the same cost values as FC405 (likely copy-paste). Flagged in KPI List_Enhanced.xlsx → 8.Data Quality.', true),
  fc409: badge('no P&L block','FC409 has no block in the P&L sheet yet — figures taken from the FC409 account sheet (cost & last-mile only; no sales/orders).'),
  fc403: badge('recon gap','Jun-26: P&L total 31.91 MB vs FC403 account sheet 32.67 MB (Δ0.76 MB). P&L used as source of truth.'),
  lmInterim: badge('interim source','Dedicated last-mile data file not yet available — figure comes from FC P&L “- Last mile” rows.'),
  perKg: badge('unit: THB/Kg','Unit note — not a warning. Fresh volume is recorded in tons in the source file, and the file states its own fresh unit costs per kilogram. This dashboard follows that convention, so fresh cost reads as THB per kg. To quote it per ton, multiply by 1,000 (e.g. 3.28 THB/kg = 3,280 THB/ton). Dry uses cases instead, which is why only the fresh cards carry this note.'),
  aoSales: badge('sales: AO','Sales, orders and AOV for the fulfillment centers come from Axtra Omni Channel (AO). Any KPI on this dashboard that divides by FC sales uses AO as its source.'),
  rmsSales: badge('sales: RMS','Sales used for last-mile KPIs come from RMS. Because FC figures come from Axtra Omni Channel (AO), the two will not tie exactly — they are different source systems.'),
};
/* dec-based labels let the engine add decimals automatically when neighbouring

const dlMB0 = {dec:0};
const dlMB1 = {dec:1};
const dl2   = {dec:2};
const DH = ' <span class="drill-hint">click to drill in</span>';
/* badge naming the active last-mile/sales source (switchable in the top bar) */
/* Each page reads the system that owns it; the badge states which one, so no
   source filter is needed on Unit Cost Analysis. */
const srcBadge = () => badge('source: '+(curSrc()==='LMD'?'LMD file / RMS':'FC P&L / AO'), SRC_TIP[curSrc()]+
  ' On this page you can switch source in the top bar — cost and sales always move together, so a ratio never mixes systems. Other pages are fixed to the system that owns them.');   /* hint appended to titles of drillable charts */

/* =========================== SUMMARY =========================== */
function pgSummary(el){
  const i = mi(S.month);
  /* Total SCM = B2B (DC incl. TFRS16 + Mid-Mile) + B2C (FC Operation + Last-Mile).
     Last-Mile is the whole delivery operation — FC + Store + Local — from the LMD
     file. The FC P&L last-mile line is excluded so FC delivery is counted once. */
  const lmUse = SEG.lastMile;
  const totArr  = M.map((_,k)=> SEG.b2bWH[k]+SEG.midMile[k]+SEG.fcOp[k]+(lmUse[k]||0));
  const pSumT = a => pSum(a), pPrevT = a => pPrev(a);
  const tot=pSum(totArr), b2bwh=pSum(SEG.b2bWH), mm=pSum(SEG.midMile), fco=pSum(SEG.fcOp);
  const mix = v => tot? (v/tot*100).toFixed(1)+'% of total' : '';
  const segCard = (t,arr,v,extra='') => kpi({title:t, val:fMB(v), unit:'MB', sub:mix(v),
      chips:[chip(pSum(arr),pPrev(arr),cmpLbl()), chip(pSum(arr),pYoY(arr),'YoY')], badge:extra});
  const prevTot = pPrev(totArr);
  const dTot = prevTot? tot/prevTot-1 : null;

  /* ---- WHAT TO WATCH (the monitoring focus): red = cost up (bad), green = cost down (good) ---- */
  const movers=[['Distribution Center',SEG.b2bWH],['Mid-Mile',SEG.midMile],['FC Operation',SEG.fcOp]]
    .map(([n,a])=>({n, cur:pSum(a), d:(pPrev(a)!=null)? pSum(a)-pPrev(a):0, p:(pPrev(a)? pSum(a)/pPrev(a)-1:null)}))
    .sort((a,b)=>b.d-a.d);
  const up=movers.filter(m=>m.d>0.01), dn=movers.filter(m=>m.d<-0.01);
  const PAGE_OF={'Distribution Center':['dc',null,'Distribution Center'],'Mid-Mile':['mm',null,'Mid-Mile'],'FC Operation':['fc','OVERVIEW','Fulfillment Center']};
  /* ---- root-cause helpers: dig one level under each flag so the reader sees WHY ---- */
  const _sgn=x=>x>0?'+':'−';
  const dcMoveTop=()=>DC_ORDER.map(sh=>({sh,d:pSum(dcWH(sh))-(pPrev(dcWH(sh))||0)})).sort((a,b)=>Math.abs(b.d)-Math.abs(a.d))[0];
  const fcMoveTop=()=>FC_ORDER.map(c=>({c,d:pSum(FC[c].op)-(pPrev(FC[c].op)||0)})).sort((a,b)=>Math.abs(b.d)-Math.abs(a.d))[0];
  function segDriver(name){
    if(name==='Distribution Center'){const m=dcMoveTop(); return m&&Math.abs(m.d)>0.01? `led by ${m.sh} ${_sgn(m.d)}${fMB(Math.abs(m.d))} MB` : 'spread evenly across the distribution centers';}
    if(name==='Mid-Mile'){const dry=pSum(dcMB('Dry','transport'))-(pPrev(dcMB('Dry','transport'))||0), fr=pSum(dcMB('Fresh','transport'))-(pPrev(dcMB('Fresh','transport'))||0); const [n,d]=Math.abs(dry)>=Math.abs(fr)?['Dry',dry]:['Fresh',fr]; return Math.abs(d)>0.01? `led by ${n} transport ${_sgn(d)}${fMB(Math.abs(d))} MB` : 'Dry and Fresh transport both steady';}
    if(name==='FC Operation'){const m=fcMoveTop(); return m&&Math.abs(m.d)>0.01? `led by ${FC_SHORT[m.c]} ${_sgn(m.d)}${fMB(Math.abs(m.d))} MB` : 'spread across the fulfillment centers';}
    return '';
  }
  const dcTopSection=sh=>{const s=DC_SECS.map(([k,n])=>({n,v:pSum(dcMB(sh,k))})).sort((a,b)=>b.v-a.v)[0]; return s? `${s.n.replace(/ \(.*/,'')} is its largest cost at ${fMB(s.v)} MB` : '';};

  /* Each item states a fact, a root cause, and links to the page that explains it. */
  const watch=[];
  const topMover=movers.slice().sort((a,b)=>Math.abs(b.d)-Math.abs(a.d))[0];
  watch.push({dir:(dTot==null?'':(dTot>0.0005?'up':(dTot<-0.0005?'dn':''))), go:['guide',null,'Sources'],
    html:`<b>Total SCM ${fMB(tot)} MB</b>${dTot==null?'':` — <span class="${dTot>0?'pos':'neg'}">${fPct(dTot)} ${cmpLbl()}</span> vs ${fMB(prevTot)} MB`}. Last-mile counted here: FC + Store + Local (LMD file).`,
    why:(dTot!=null && topMover && Math.abs(topMover.d)>0.01)? `Root cause: the biggest driver of the change is ${topMover.n} ${_sgn(topMover.d)}${fMB(Math.abs(topMover.d))} MB ${cmpLbl()}.` : 'The four segments were broadly flat versus the prior period.'});
  if(up.length) watch.push({dir:'up', go:PAGE_OF[up[0].n],
    html:`Largest increase: <b>${up[0].n}</b> <span class="pos">+${fMB(up[0].d)} MB (${fPct(up[0].p)})</span>.`,
    why:`Root cause: ${segDriver(up[0].n)}.`});
  if(dn.length) watch.push({dir:'dn', go:PAGE_OF[dn[0].n],
    html:`Largest reduction: <b>${dn[0].n}</b> <span class="neg">−${fMB(Math.abs(dn[0].d))} MB (${fPct(dn[0].p)})</span>.`,
    why:`Root cause: ${segDriver(dn[0].n)}.`});
  const dcVals=DC_ORDER.map(sh=>({sh,v:pSum(dcWH(sh)),dry:RAW.dc[sh].temp==='Dry'})); const dcAvg=dcVals.reduce((a,b)=>a+b.v,0)/(dcVals.length||1);
  const hiDC=dcVals.filter(x=>x.v>dcAvg).sort((a,b)=>b.v-a.v).slice(0,3);
  if(hiDC.length) watch.push({dir:'flag', go:['dc',hiDC[0].sh,hiDC[0].sh],
    html:`Above the ${fMB(dcAvg)} MB average distribution-center cost: <b>${hiDC.map(x=>x.sh).join(', ')}</b>.`,
    why:`Why: they run more volume than the other sites — ${dcTopSection(hiDC[0].sh)} at ${hiDC[0].sh}, which pulls it above the ${fMB(dcAvg)} MB average.`});
  /* unit-cost outlier: the DC whose unit cost moved most this period */
  const ucMove=DC_ORDER.map(sh=>{ const dry=RAW.dc[sh].temp==='Dry';
      const cost=dcRaw(sh,'total_wh'), vol=dry? dcRaw(sh,'inbound_case') : dcRaw(sh,'ton').map(t=>t*1000);
      const now=unitNow(cost,vol), prev=unitPrev(cost,vol);
      return {sh, dry, now, p:(prev&&now)? now/prev-1 : null}; })
    .filter(x=>x.p!=null && isFinite(x.p)).sort((a,b)=>Math.abs(b.p)-Math.abs(a.p))[0];
  if(ucMove){ const _c=dcRaw(ucMove.sh,'total_wh'), _v=ucMove.dry? dcRaw(ucMove.sh,'inbound_case') : dcRaw(ucMove.sh,'ton').map(t=>t*1000);
    ucMove.costP=pPrev(_c)? pSum(_c)/pPrev(_c)-1 : null; ucMove.volP=pPrev(_v)? pSum(_v)/pPrev(_v)-1 : null; }
  const ucWhy = ucMove ? ((ucMove.costP!=null&&ucMove.volP!=null)
      ? `Root cause: cost ${fPct(ucMove.costP)} while ${ucMove.dry?'cases':'kg'} handled ${fPct(ucMove.volP)} — unit cost = cost ÷ volume, so the two moving apart drives the rate.`
      : `Root cause: unit cost = cost ÷ ${ucMove.dry?'inbound cases':'kg'}; the two moved apart this period.`) : '';

    why:ucWhy});
  const lmJ=lmIdx();
  if(LM.ok && lmJ>=0) watch.push({dir:'flag', go:['lm','OVERVIEW','Last-Mile'],
    html:`Total last-mile delivery <b>${fMB(LM.cost[lmJ])} MB</b> in ${label(M[lmJ])} across Store, FC and Local${lmStale()?` — the last-mile workbook ends one month before the cost ledgers`:''}.`,
    why:`Where it sits: FC ${fMB(LM.fc.cost[lmJ])} · Store ${fMB(LM.store.cost[lmJ])} · Local ${fMB(LM.local.cost[lmJ])} MB — Store is the largest slice of delivery cost.`});
  watch.push({dir:'flag', go:['guide',null,'Data quality'],
    html:`Confirm with Finance: FC406 costs mirror FC405 · FC409 has no P&amp;L block · FC403 reconciliation gap −0.76 MB.`,
    why:`Why: these are quirks of the source workbooks (a duplicated cost block, a centre with no P&amp;L, a small ledger-vs-P&amp;L gap), not dashboard errors — confirm before sign-off.`});

  /* ---- NEED TO TAKE ACTION — the red flags only: costs rising, cost outliers, and
     figures that must be confirmed. Strictly factual; each row states a root cause and
     links to the evidence. high = a cost increase or a data gap · med = a figure to confirm. ---- */
  const acts=[];

    html:`<b>Total SCM rose to ${fMB(tot)} MB</b> — <span class="neg">+${fPct(dTot)} ${cmpLbl()}</span>, ${fMB(tot-prevTot)} MB above ${fMB(prevTot)} MB.`,
    why:(topMover&&Math.abs(topMover.d)>0.01)? `Root cause: mostly ${topMover.n} ${_sgn(topMover.d)}${fMB(Math.abs(topMover.d))} MB — start there.` : ''});
  up.forEach(m=>acts.push({sev:'high', go:PAGE_OF[m.n],
    html:`<b>${m.n}</b> cost up <span class="neg">+${fMB(m.d)} MB (${fPct(m.p)})</span> ${cmpLbl()}.`,
    why:`Root cause: ${segDriver(m.n)}.`}));
  if(ucMove && ucMove.p>0.0005) acts.push({sev:'high', go:['dc',ucMove.sh,ucMove.sh],
    html:`Unit cost rising at <b>${ucMove.sh}</b>: ${fmt(ucMove.now,2)} ${ucMove.dry?'THB/case':'THB/kg'} <span class="neg">(${fPct(ucMove.p)} ${cmpLbl()})</span>.`,
    why:ucWhy});
  if(lmMissing(i)) acts.push({sev:'high', go:['lm','OVERVIEW','Last-Mile'],
    html:`<b>No last-mile data for ${label(S.month)}</b> — Total SCM here covers B2B + FC operation only.`,
    why:`Why: the LMD workbook has no row for ${label(S.month)} yet, so the B2C delivery portion is not in this total — treat the figure as partial.`});
  if(hiDC.length) acts.push({sev:'med', go:['dc',hiDC[0].sh,hiDC[0].sh],
    html:`Above the ${fMB(dcAvg)} MB average distribution-center cost: <b>${hiDC.map(x=>x.sh).join(', ')}</b> — review the drivers.`,
    why:`Why: ${dcTopSection(hiDC[0].sh)} at ${hiDC[0].sh} — check whether the volume it carries justifies the cost.`});
  acts.push({sev:'med', go:['guide',null,'Data quality'],
    html:`Confirm with Finance: FC406 costs mirror FC405 · FC409 has no P&amp;L block · FC403 reconciliation gap −0.76 MB.`,
    why:`Why: source-workbook quirks that need a Finance confirmation before this is signed off.`});

  const lmSeg=pSum(lmUse);
  const scopeNote = 'Last-mile = FC + Store + Local (LMD file); distribution-center cost includes TFRS16.'
    + (lmMissing(i) ? ' <b>No last-mile data for this month</b> — the total below covers B2B + FC operation only.' : '');
  const netBanner = '';
  el.innerHTML = netBanner + `
  <div class="grid summ-top" style="grid-template-columns:1.35fr 1.65fr;margin-bottom:14px;align-items:stretch">
    ${kpi({hero:true,title:'Total SCM Cost — '+modeLbl(), val:fMB(tot), unit:'MB',
      sub:'B2B '+fMB(b2bwh+mm)+' MB (DC '+fMB(b2bwh)+' + Mid-Mile '+fMB(mm)+') · B2C '+fMB(fco+lmSeg)+' MB (FC op '+fMB(fco)+' + Last-Mile '+fMB(lmSeg)+') &nbsp;|&nbsp; '+scopeNote,
      badge:' '+badge(lmMissing(i)?'partial — no last-mile':'B2B + B2C', TOTAL_TXT + (lmMissing(i)?' NOTE: the LMD file has no data for this month, so last-mile is not included in this total.':'')),
      chips:[chip(tot,prevTot,cmpLbl()), `<span class="chip lbl">YoY n/a — B2C scope added 2026</span>`]})}
    <div class="grid summ-segs">
      ${segCard('B2B · Distribution Center', SEG.b2bWH, b2bwh)}
      ${segCard('B2B · Mid-Mile Transport', SEG.midMile, mm)}
      ${segCard('B2C · FC Operation', SEG.fcOp, fco, ' '+BADGES.fc409)}
      ${segCard('B2C · Last-Mile Delivery', lmUse, lmSeg, ' '+badge('FC + Store + Local','The whole delivery operation from LMD Cost Data.xlsb — row “Cost (Store+FC+Local)”. This is what Total SCM counts. The FC P&L “− Last mile” line is a different view of the FC portion only and is deliberately excluded from the total so nothing is counted twice.'))}
    </div>
  </div>
  <div class="grid g2e" style="align-items:start">
    <div class="card" style="border-left:3px solid var(--accent)"><h4>⚑ What to watch — ${modeLbl()} ${info('Every line is generated from the figures of this period. Click a line to open the page that explains it.')}</h4>
      ${watch.map(w=>{ const g=w.go||['guide',null,'Open'];
        const arg = g[1]? ",'"+String(g[1]).replace(/'/g,'')+"'" : '';
        return `<button class="watch" onclick="goTo('${g[0]}'${arg})">
          <span class="wdot ${w.dir}"></span><span class="wtx">${w.html}${w.why?`<span class="wsub">${w.why}</span>`:''}</span><span class="wgo">${g[2]||'Open'} ›</span></button>`;}).join('')}</div>
    <div class="card actioncard"><h4>⚠ Need to take action — ${modeLbl()} ${info('Only the red-flag items for this period: costs that rose, cost outliers, missing data, and figures to confirm with Finance. Click a row to open the evidence. If the list is empty, no cost increased and no data issue was found.')}</h4>
    ${acts.length? acts.map(a=>{ const arg=a.go[1]? ",'"+String(a.go[1]).replace(/'/g,'')+"'":'';
      return `<button class="watch act ${a.sev}" onclick="goTo('${a.go[0]}'${arg})"><span class="wdot ${a.sev==='high'?'up':'flag'}"></span><span class="wtx">${a.html}${a.why?`<span class="wsub">${a.why}</span>`:''}</span><span class="wgo">${a.go[2]||'Open'} ›</span></button>`;}).join('')
      : `<div class="actionclear"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>Nothing needs action this period — no segment cost rose and no data issue was detected.</div>`}</div>
  </div>
  <div class="section-h"><h5>Cost trend — 12 months to ${label(S.month)}</h5><div class="ln"></div><span class="mini">the four segments stacked = Total SCM · labels = monthly total (MB) · dashed = period average · click any month’s segment to open that page set to that month</span></div>
  <div class="card">${chBox('chTrend',310)}</div>
  <div class="grid g2e" style="margin-top:14px">
    <div class="card">${chBox('chMoM',280,`${S.mode==='M'?(i>0?label(M[i-1])+' vs ':'')+label(S.month):'YTD vs same period LY'} — by segment (MB)`)}<div class="note">Each segment carries its cost-trend colour · pale bar = previous period, solid = current. Click a bar to open that segment.</div></div>
    <div class="card">${chBox('chYoY',280,`Same ${S.mode==='M'?'month':'period'} last year — all segments (MB)`)}<div class="note">Each segment carries its cost-trend colour · pale bar = last year, solid = current. FC Operation and Last-Mile show 0 for last year because B2C data starts January 2026.</div></div>
  </div>`;

  const totSl = sl(totArr).filter(v=>v);
  const totAvg = totSl.length? totSl.reduce((a,b)=>a+b,0)/totSl.length : null;
  mkChart('chTrend',{type:'bar',data:{labels:wLBL(),datasets:[
    {label:'Distribution Center',data:sl(SEG.b2bWH),backgroundColor:SEGCOL.dcop,stack:'s',drill:i=>`goMonth('dc','${MONTHS[i]}')`},
    {label:'Mid-Mile',data:sl(SEG.midMile),backgroundColor:SEGCOL.mm,stack:'s',drill:i=>`goMonth('mm','${MONTHS[i]}')`},
    {label:'FC Operation',data:sl(SEG.fcOp),backgroundColor:SEGCOL.fcop,stack:'s',drill:i=>`goMonth('fc','${MONTHS[i]}')`},
    {label:'Last-Mile',data:sl(SEG.lastMile),backgroundColor:SEGCOL.lm,stack:'s',drill:i=>`goMonth('lm','${MONTHS[i]}')`},
  ]},options:{...padT,shareOf:'Total SCM that month',plugins:{stackTotals:dlMB0,avg:{value:totAvg,label:'avg '+(totAvg!=null?fMB(totAvg):'')+' MB'}},scales:{x:{...gridX,stacked:true},y:{...gridY,stacked:true,title:{display:true,text:'MB'}}}}});

  /* all four segments — the same scope as Total SCM, coloured to MATCH the cost trend:
     each segment carries its trend hue; the past-period bar is the same hue, paler. */
  const segNames=['Distribution Center','Mid-Mile','FC Operation','Last-Mile'];
  const segArrs=[SEG.b2bWH,SEG.midMile,SEG.fcOp,SEG.lastMile];
  const segCols=[SEGCOL.dcop,SEGCOL.mm,SEGCOL.fcop,SEGCOL.lm];
  const segPale=segCols.map(c=>lighten(c,0.60));
  const segGo=i=>["go('dc')","go('mm')","go('fc')","go('lm')"][i];
  const prevI = S.mode==='M'? i-1 : -1;
  mkChart('chMoM',{type:'bar',data:{labels:segNames,datasets:[
    {label:S.mode==='M'?(prevI>=0?label(M[prevI]):'no prior month'):'YTD LY',data:segArrs.map(a=>pPrev(a)||0),backgroundColor:segPale,legendColor:lighten(C.ink2,0.5),borderRadius:4,dl:dlMB0,drill:segGo},
    {label:S.mode==='M'?label(S.month):'YTD',data:segArrs.map(a=>pSum(a)),backgroundColor:segCols,legendColor:C.ink2,borderRadius:4,dl:dlMB0,drill:segGo},
  ]},options:{...padT,scales:{x:gridX,y:{...gridY,title:{display:true,text:'MB'}}}}});

  /* all four segments — where last year has no data (B2C starts 2026) the bar is 0 */
  const lyOf = a => (S.mode==='M'? pYoY(a) : pPrev(a)) || 0;
  mkChart('chYoY',{type:'bar',data:{labels:segNames,datasets:[
    {label:'Last year',data:segArrs.map(lyOf),backgroundColor:segPale,legendColor:lighten(C.ink2,0.5),borderRadius:4,dl:dlMB0,drill:segGo},
    {label:'Current',data:segArrs.map(a=>pSum(a)),backgroundColor:segCols,legendColor:C.ink2,borderRadius:4,dl:dlMB0,drill:segGo},
  ]},options:{...padT,scales:{x:gridX,y:{...gridY,title:{display:true,text:'MB'}}}}});
}

/* =========================== UNIT COST =========================== */
function pgUnit(el){
  const i=mi(S.month);
  /* ---- cost per order: B2C average, ranking and per-site split ---- */
  const cpoAtM=(c,k)=> FC[c].orders[k]? (FC[c].op[k]+fcLmOf(c)[k])*1e6/FC[c].orders[k] : null;
  const opoAtM=(c,k)=> FC[c].orders[k]? FC[c].op[k]*1e6/FC[c].orders[k] : null;
  const lpoAtM=(c,k)=> FC[c].orders[k]? fcLmOf(c)[k]*1e6/FC[c].orders[k] : null;
  const ordAt = k => FC_ORDER.reduce((a,c)=>a+(FC[c].orders[k]||0),0);
  const cstAt = k => FC_ORDER.reduce((a,c)=>a+(FC[c].op[k]||0)+(fcLmOf(c)[k]||0),0);
  const cpoNet     = ordAt(i)? cstAt(i)*1e6/ordAt(i) : null;
  const cpoNetPrev = (i>0 && ordAt(i-1))? cstAt(i-1)*1e6/ordAt(i-1) : null;
  const cpoRank = FC_ORDER.filter(c=>cpoAtM(c,i)!=null).map(c=>({c, name:FC_SHORT[c], v:cpoAtM(c,i),
      op:opoAtM(c,i), lm:lpoAtM(c,i), prev:(i>0? cpoAtM(c,i-1):null)})).sort((a,b)=>b.v-a.v);
  const dryWH=dcRaw('Dry','total_wh'), dryIn=dcRaw('Dry','inbound_case'), dryGrand=dcRaw('Dry','grand_total');
  const freshWH=dcRaw('Fresh','total_wh'), freshKg=dcRaw('Fresh','ton').map(t=>t*1000), freshGrand=dcRaw('Fresh','grand_total');
  const mmC=dcRaw('Dry','transport'), outC=dcRaw('Dry','outbound_case'), trips=dcRaw('Dry','trip');
  const uCard=(t,cost,vol,unit,dec=2,bd='')=>kpi({title:t,val:fmt(unitNow(cost,vol),dec),unit,badge:bd,
    chips:[chip(unitNow(cost,vol),unitPrev(cost,vol),cmpLbl()),chip(unitNow(cost,vol),unitYoY(cost,vol),'YoY')]});

  const dash='<span class="mut">–</span>';
  const fcRows=FC_ORDER.map(c=>{
    const f=FC[c]; const ord=f.orders[i];
    if(!ord) return [`<span class="name">${f.name}</span> ${c==='FC409'?BADGES.fc409:(c==='FC411'?'<span class="chip lbl">ramp-up</span>':'')}`, dash, dash, dash, dash, dash];
    const lmArr=fcLmOf(c);
    const wo=f.op[i]*1e6/ord, lo=(lmArr[i]||0)*1e6/ord, to=wo+lo;
    const pOrd=f.orders[i-1], pTo=pOrd? (f.op[i-1]+(lmArr[i-1]||0))*1e6/pOrd : null;
    const vsAvg = cpoNet? to/cpoNet-1 : null;
    return [`<span class="name">${f.name}</span> ${c==='FC406'?BADGES.fc406:''}${c==='FC403'?BADGES.fc403:''}`, fmt(ord,0), fmt(wo,0), fmt(lo,0), `<b>${fmt(to,0)}</b>`, pctCell(vsAvg), pctCell(pTo?to/pTo-1:null)];
  });

  el.innerHTML = `
  <div class="section-h" style="margin-top:0">
    <h5><span class="swatch" style="background:${TEMP_COLOR.Dry}"></span>DRY — unit costs</h5><div class="ln"></div>
    <span class="mini">${modeLbl()} · cases are the volume driver</span></div>
  <div class="grid cards4">
    ${uCard('Dry · DC cost per case', dryWH, dryIn,'THB/Case')}
    ${uCard('Dry · All-in per case (DC + Mid-Mile)', dryGrand, dryIn,'THB/Case')}
    ${uCard('Dry · Mid-Mile per trip', mmC, trips,'THB/Trip',0)}
    ${uCard('Dry · Mid-Mile per case', mmC, outC,'THB/Case')}
  </div>
  <div class="section-h">
    <h5><span class="swatch" style="background:${TEMP_COLOR.Fresh}"></span>FRESH — unit costs</h5><div class="ln"></div>
    <span class="mini">${modeLbl()} · kilograms are the volume driver</span></div>
  <div class="grid cards4">
    ${uCard('Fresh · DC cost per kg', freshWH, freshKg,'THB/Kg',2,' '+BADGES.perKg)}
    ${uCard('Fresh · All-in per kg (DC + Mid-Mile)', freshGrand, freshKg,'THB/Kg')}
    ${uCard('Fresh · Mid-Mile per kg', dcRaw('Fresh','transport'), freshKg,'THB/Kg')}
    ${kpi({title:'Dry · Cases per trip',val:fmt(unitNow(outC,trips),0),unit:'case/trip',
      chips:[chip(unitNow(outC,trips),unitPrev(outC,trips),cmpLbl(),true),chip(unitNow(outC,trips),unitYoY(outC,trips),'YoY',true)],
      sub:'truck utilisation — fresh trips are not tracked in the source file'})}
  </div>
  <div class="grid g2e" style="margin-top:14px">
    <div class="card">${chBox('chUDry',260,'Dry unit cost trend (THB/Case)')}</div>
    <div class="card">${chBox('chUFresh',260,'Fresh unit cost trend (THB/Kg)')}</div>
  </div>
  <div class="section-h"><h5>B2C — What one order costs to fulfill and deliver</h5><div class="ln"></div><span class="mini">${label(S.month)} · cost per order includes fulfillment operation + last-mile delivery · source: ${SRC_NAME[curSrc()]} ${info('Use the “Last-mile source” switch in the top bar to compare the two systems. FC P&L books delivery in the fulfillment ledger (sales from Axtra Omni Channel); the LMD file books the same trips from the delivery operation (sales from RMS). Cost and sales switch together, so the ratio is never mixed.')}</span></div>
  <div class="grid cards4" style="margin-bottom:14px">
    ${kpi({title:'B2C Cost per Order', val:cpoNet!=null? fmt(cpoNet,0):'–', unit:'THB / order',
      sub:'all fulfillment centers together — total B2C cost ÷ total orders', badge:' '+srcBadge(),
      chips:[chip(cpoNet, cpoNetPrev, cmpLbl())]})}
    ${kpi({title:'Cheapest Cost per Order', val:cpoRank.length? fmt(cpoRank[cpoRank.length-1].v,0):'–', unit:'THB / order',
      sub:cpoRank.length? cpoRank[cpoRank.length-1].name : ''})}
    ${kpi({title:'Highest Cost per Order', val:cpoRank.length? fmt(cpoRank[0].v,0):'–', unit:'THB / order',
      sub:cpoRank.length? cpoRank[0].name : ''})}
    ${kpi({title:'Cost per Order Gap', val:cpoRank.length>1? fmt(cpoRank[0].v-cpoRank[cpoRank.length-1].v,0):'–', unit:'THB / order',
      sub:'highest minus cheapest — the spread across centers'})}
  </div>
  <div class="grid g2">
    <div class="card">${chBox('chUFC',320,'Cost per order by fulfillment center — '+label(S.month)+' (THB)')}
      <div class="note">One bar per center, tallest cost first. Each bar splits into <span class="swatch" style="background:${SEGCOL.fcop}"></span>fulfillment operation and <span class="swatch" style="background:${SEGCOL.lm}"></span>last-mile delivery, and the dashed line is the B2C average of ${cpoNet!=null? fmt(cpoNet,0):'–'} THB. Read it as: how much does it cost us to get one order out of this site.</div></div>
    <div class="card"><h4>The same figures as a table — ${label(S.month)}</h4>${tbl(['Fulfillment Center','Orders','Operation / order','Last-mile / order','Total / order','vs B2C average','MoM'],fcRows)}
      <div class="note">Orders = average orders per day × days in the month (equals sales ÷ AOV). A center above the B2C average is dearer to serve than the average order.</div></div>
  </div>`;

  mkChart('chUDry',{type:'line',data:{labels:wLBL(),datasets:[
    line({label:'DC only',data:sl(unitArr(dryWH,dryIn)),borderColor:C.gold,dec:2,dl:{...dl2,mode:'last'}}),
    line({label:'incl. Mid-Mile (B2B)',data:sl(unitArr(dryGrand,dryIn)),borderColor:C.navy,dec:2,dl:{...dl2,mode:'last'}}),
  ]},options:{...padR,scales:{x:gridX,y:{...gridY}}}});
  mkChart('chUFresh',{type:'line',data:{labels:wLBL(),datasets:[
    line({label:'DC only',data:sl(unitArr(freshWH,freshKg)),borderColor:C.gold,dec:2,dl:{...dl2,mode:'last'}}),
    line({label:'incl. Mid-Mile (B2B)',data:sl(unitArr(freshGrand,freshKg)),borderColor:C.teal,dec:2,dl:{...dl2,mode:'last'}}),
  ]},options:{...padR,scales:{x:gridX,y:{...gridY}}}});
  /* One horizontal bar per center: operation + last-mile stacked, network
     average as a dashed reference. Horizontal keeps the site names readable
     however many centers open later. */
  mkChart('chUFC',{type:'bar',data:{labels:cpoRank.map(r=>r.name),datasets:[
    {label:'Fulfillment operation / order',data:cpoRank.map(r=>r.op),backgroundColor:SEGCOL.fcop,stack:'s',borderRadius:3,dl:{dec:0}},
    {label:'Last-mile delivery / order',   data:cpoRank.map(r=>r.lm),backgroundColor:SEGCOL.lm,  stack:'s',borderRadius:3,dl:{dec:0}},
  ]},options:{indexAxis:'y',...padR,shareOf:'the cost per order',plugins:{avg:{value:cpoNet||0,label:'B2C average '+(cpoNet!=null?fmt(cpoNet,0):'')}},
    scales:{x:{...gridY,stacked:true,title:{display:true,text:'THB per order'}},y:{...gridX,stacked:true}}}});
}

/* =========================== DISTRIBUTION CENTER =========================== */
const DC_SECS=[['personnel','Personnel'],['establishment','Establishment'],['sales_promo','Sales Promo'],['computer','Computer'],['repair_maint','R&M'],['general','General (incl. outsourcing)'],['depreciation','D&A'],['rent','Rent'],['financial','Financial']];
function pgDC(el){

    <span class="gap"></span><span class="glab">Totals</span>
    ${['Dry','Fresh'].map(s=>`<span class="sc ${S.dc===s?'on':''}" onclick="S.dc='${s}';render()">${s} Total</span>`).join('')}
    <span class="gap"></span><span class="glab">Dry</span>
    ${['CDC (Dry)','MKD1','MKB','MKD2','HDC','WFDC'].map(s=>`<span class="sc ${S.dc===s?'on':''}" onclick="S.dc='${s}';render()">${s}</span>`).join('')}
    <span class="gap"></span><span class="glab">Fresh</span>

function dcOverview(el, chipsRow){
  const i=mi(S.month);
  const dryT=pSum(dcWH('Dry')), freshT=pSum(dcWH('Fresh')), tot=dryT+freshT;
  const fx=pSum(add(dcMB('Dry','fixed_cost'),dcMB('Fresh','fixed_cost'))), vr=pSum(add(dcMB('Dry','variable_cost'),dcMB('Fresh','variable_cost')));
  const rows=DC_ORDER.map(sh=>{
    const wh=dcWH(sh); const isDry=RAW.dc[sh].temp==='Dry';
    const vol=isDry? dcRaw(sh,'inbound_case') : dcRaw(sh,'ton');
    const u=isDry? unitNow(dcRaw(sh,'total_wh'),dcRaw(sh,'inbound_case')) : unitNow(dcRaw(sh,'total_wh'),dcRaw(sh,'ton').map(t=>t*1000));
    return [`<span class="name">${sh}</span> <span class="chip lbl">${isDry?'Dry':'Fresh'}</span>`,
      fMB(pSum(wh)), (pSum(wh)/tot*100).toFixed(1)+'%',
      isDry? fmt(pSum(vol)/1e6,2)+'M cases' : fmt(pSum(vol),0)+' t',
      fmt(u,2)+(isDry?' /case':' /kg'),
      pctCell(pPrev(wh)? pSum(wh)/pPrev(wh)-1 : null), pctCell(pYoY(wh)? pSum(wh)/pYoY(wh)-1 : null)];
  });
  el.innerHTML = chipsRow + `
  <div class="grid cards4">

function dcDetail(el, chipsRow, sh){

    ${kpi({title:'Unit Cost',val:fmt(u,2),unit:isDry?'THB/Case':'THB/Kg',badge:isDry?'':' '+BADGES.perKg,
      chips:[chip(u,unitPrev(whT,vol),cmpLbl()),chip(u,unitYoY(whT,vol),'YoY')]})}

        .concat([[`<span class="name mut">Other income (offset)</span>`,fMB(pSum(dcMB(sh,'other_income'))),'','' ],[`<span class="name mut">TFRS16 add-on</span>`,fMB(pSum(dcMB(sh,'tfrs16'))),'','' ]]),
        ['<b>Total DC Operation Cost</b>',fMB(pSum(whMB)),'100%',''])}
      <div class="note">Outsourcing service fee = ${fMB(outs)} MB — ${gen?(outs/gen*100).toFixed(0):0}% of General expenses (largest single cost driver).</div>
    </div>
  </div>
  <div class="grid g3" style="margin-top:14px">
