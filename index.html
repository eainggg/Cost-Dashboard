/* period-aware AOV (THB/order): monthly = P&L AOV row; YTD = Σsales ÷ Σorders */
function aovOf(f){
  if(S.mode==='M') return f.aov[mi(S.month)] || null;
  const ords=periodIdx().reduce((a,k)=>a+(f.orders[k]||0),0);
  const s=pSum(f.sales);
  return (ords && s)? s*1e6/ords : null;
}
function fcOverview(el, chipsRow){
  const i=mi(S.month);
  const op=sumFC('op'), sales=sumFC('sales');
  const rows=FC_ORDER.map(c=>{const f=FC[c];
    const s=pSum(f.sales), o=pSum(f.op);
    const ord=f.orders[i], cpo=ord? f.op[i]*1e6/ord : null;
    const av=aovOf(f);
    return [`<span class="name">${f.name}</span> ${c==='FC406'?BADGES.fc406:''}${c==='FC409'?BADGES.fc409:''}${c==='FC403'?BADGES.fc403:''}`,
      s?fMB(s):'<span class="mut">–</span>',
      av? fmt(av,0):'<span class="mut">–</span>', `<b>${fMB(o)}</b>`,
      s? (o/s*100).toFixed(1)+'%' : '<span class="mut">–</span>',
      cpo? fmt(cpo,0):'<span class="mut">–</span>', pctCell(pPrev(f.op)? o/pPrev(f.op)-1:null)];
  });
  const ordAll=periodIdx().reduce((a,k)=>a+FC_ORDER.reduce((x,c)=>x+(FC[c].orders[k]||0),0),0);
  const aovAll=(ordAll && pSum(sales))? pSum(sales)*1e6/ordAll : null;
  const c2s = pSum(sales)? pSum(op)/pSum(sales)*100 : null;
  const aovRank = FC_ORDER.map(c=>({c, v:aovOf(FC[c])})).filter(x=>x.v).sort((a,b)=>b.v-a.v);
  const aovAvg = aovRank.length? aovRank.reduce((a,b)=>a+b.v,0)/aovRank.length : null;
  el.innerHTML = chipsRow + `
  <div class="grid cards4">
    ${kpi({title:'B2C FC Operation Cost',val:fMB(pSum(op)),unit:'MB',sub:'delivery reported under Last-Mile',chips:[chip(pSum(op),pPrev(op),cmpLbl())]})}
    ${kpi({title:'Sales (GMV)',val:fMB(pSum(sales)),unit:'MB',sub:'e-commerce gross merchandise value',badge:' '+srcBadge(),chips:[chip(pSum(sales),pPrev(sales),cmpLbl(),true)]})}
    ${kpi({title:'Cost-to-Sale',val:c2s!=null?c2s.toFixed(1):'–',unit:'%',sub:'FC operation ÷ sales',badge:' '+srcBadge()})}
    ${kpi({title:'Average AOV',val:aovAll?fmt(aovAll,0):'–',unit:'THB/order',sub:'Σ sales ÷ Σ orders'})}
  </div>
  <div class="grid g2e" style="margin-top:14px">
    <div class="card">${chBox('chFCsc',300,'Sales vs FC Operation cost by FC — '+modeLbl()+' (MB)'+DH)}</div>
    <div class="card">${chBox('chFCtrend',300,'FC operation cost trend by FC (MB) — labels = month total'+DH)}</div>
  </div>
  <div class="card" style="margin-top:14px">${chBox('chFCaov',300,'AOV by FC — '+modeLbl()+' (THB/order, ranked vs peer average)'+DH)}<div class="note">AOV = Sales ÷ orders. Shown as a ranked bar so it scales as more FCs are added; the dashed line is the average across FCs. FC409/FC411: no order data yet.</div></div>
  <div class="card" style="margin-top:14px"><h4>FC benchmark — ${modeLbl()}</h4>
    ${tbl(['Fulfillment Center','Sales (MB)','AOV (THB)','FC Operation (MB)','Cost-to-Sale','Cost/Order (THB)',cmpLbl()],rows,
      ['<b>B2C Total</b>',fMB(pSum(sales)),aovAll?fmt(aovAll,0):'–',fMB(pSum(op)),pSum(sales)?(pSum(op)/pSum(sales)*100).toFixed(1)+'%':'–','',''])}
    <div class="note">Source: FC P&L sheet (KTHB → MB). Cost = FC operation only; its delivery sits in the Last-Mile total. FC409 from its account sheet. Cost/Order shown for the selected month.</div>
  </div>`;
  /* each FC in its own master colour (the same FC_COLOR used by AOV-by-FC and the trend),
     the two series told apart by tone: Sales = lighter, FC operation = full colour. */
  mkChart('chFCsc',{type:'bar',data:{labels:FC_ORDER.map(c=>FC_SHORT[c]),datasets:[
    {label:'Sales',data:FC_ORDER.map(c=>pSum(FC[c].sales)),backgroundColor:FC_ORDER.map(c=>lighten(FC_COLOR[c],0.5)),legendColor:lighten(C.ink2,0.5),borderRadius:4,dl:dlMB1,drill:i=>`S.fc='${FC_ORDER[i]}';render()`},
    {label:'FC operation',data:FC_ORDER.map(c=>pSum(FC[c].op)),backgroundColor:FC_ORDER.map(c=>FC_COLOR[c]),legendColor:C.ink2,borderRadius:4,dl:dlMB1,drill:i=>`S.fc='${FC_ORDER[i]}';render()`}]},
    options:{...padT,scales:{x:gridX,y:{...gridY,title:{display:true,text:'MB'}}}}});
  mkChart('chFCtrend',{type:'bar',data:{labels:fLBL(),datasets:FC_ORDER.map((c,k)=>({label:FC_SHORT[c],data:fsl(FC[c].op),backgroundColor:FC_COLOR[c],stack:'s',drill:`S.fc='${c}';render()`}))},
    options:{...padT,plugins:{stackTotals:dlMB0},scales:{x:{...gridX,stacked:true},y:{...gridY,stacked:true,title:{display:true,text:'MB'}}}}});
  mkChart('chFCaov',{type:'bar',data:{labels:aovRank.map(x=>FC_SHORT[x.c]),datasets:[
    {label:'AOV',data:aovRank.map(x=>x.v),backgroundColor:aovRank.map(x=>FC_COLOR[x.c]),borderRadius:4,dl:{dec:0},drill:i=>`S.fc='${aovRank[i].c}';render()`}]},

}

function alignPnlDays(code,i){ const p=RAW.fc[code].pnl; if(!p||!p.months||!p.days) return null; const j=p.months.indexOf(M[i]); return j>=0? p.days[j]:null; }

/* =========================== LAST-MILE DELIVERY ===========================
   Built to the KPI list in "Summary Last mile cost … Re.2.xlsx"
   (sheets 1.Overview / 2.Store / 3.FC / 4.Local / 5.Performance Cost).
   Sales come from RMS; money is converted THB → MB. Local is still being
   built by the business, so it carries an explicit "under construction" note. */
const LM_TABS = [['OVERVIEW','Overview'],['STORE','Store'],['FC','FC'],['LOCAL','Local'],['PERF','Performance']];
/* period helpers that follow the last-mile calendar (its data may lag the P&L) */
function lmPeriod(){
  const j=lmIdx(); if(j<0) return [];
  if(S.mode==='M') return [j];
  const y=M[j].split('-')[0]; const out=[];
  for(let k=0;k<=j;k++) if(M[k].startsWith(y) && LM.has[k]) out.push(k);
  return out;
}
const lmSum  = a => lmPeriod().reduce((s,k)=>s+(a[k]||0),0);
const lmAvg  = a => { const p=lmPeriod().filter(k=>a[k]); return p.length? p.reduce((s,k)=>s+a[k],0)/p.length : null; };
function lmPrev(a){
  const j=lmIdx(); if(j<0) return null;
  if(S.mode==='M'){ for(let k=j-1;k>=0;k--) if(LM.has[k]) return a[k]; return null; }
  const idx=lmPeriod().map(k=>k-12).filter(k=>k>=0 && LM.has[k]);
  return idx.length? idx.reduce((s,k)=>s+(a[k]||0),0) : null;
}
function lmPrevAvg(a){
  const j=lmIdx(); if(j<0) return null;
  if(S.mode==='M'){ for(let k=j-1;k>=0;k--) if(LM.has[k]&&a[k]) return a[k]; return null; }
  const idx=lmPeriod().map(k=>k-12).filter(k=>k>=0 && LM.has[k] && a[k]);
  return idx.length? idx.reduce((s,k)=>s+a[k],0)/idx.length : null;
}
function lmYoY(a){ const j=lmIdx(); if(j<0||S.mode!=='M') return null; return (j>=12 && LM.has[j-12] && a[j-12]) ? a[j-12] : null; }
const lmLbl = () => { const j=lmIdx(); return j<0? '–' : (S.mode==='M' ? label(M[j]) : 'YTD Jan–'+label(M[j]).split(' ')[0]+' '+M[j].split('-')[0]); };
/* month axis: the 12 last-mile-data months ending at lmIdx() — the effective last-mile
   month, which is the selected month when it has data, else the newest month that does.
   This keeps the last-mile trends in step with the KPI cards (which also use lmIdx). */
const lmAxis = () => { const out=[], e=lmIdx(); if(e<0) return out; const s=Math.max(0, e-(WIN-1)); LM.has.forEach((v,i)=>{ if(v && i>=s && i<=e) out.push(i); }); return out; };
const lmSeries = a => lmAxis().map(k=>a[k]);
const lmLabels = () => lmAxis().map(k=>LBL[k]);

function pgLM(el){
  if(!LM.ok || lmIdx()<0){
    el.innerHTML = `<div class="card dev"><div class="devic">${ICONS.lm.replace('width="16" height="16"','width="52" height="52"')}</div>
      <h3>Last-Mile Delivery — no data loaded</h3>
      <p>The last-mile workbook (<b>Summary Last mile cost … .xlsx</b>) was not found next to the cost files, so this page has nothing to show.</p>
      <p class="note">Add the file to the dashboard folder and rebuild; the page fills itself automatically.</p></div>`;
    return;
  }
  const tabs = `<div class="selrow">${LM_TABS.map(([k,n])=>
      `<span class="sc ${S.lm===k?'on':''}" onclick="S.lm='${k}';render()">${n}</span>`).join('')}</div>`;
  const stale = lmStale()
    ? `<div class="card" style="border-left:4px solid var(--gold);margin-bottom:14px;padding:12px 16px">
         <div class="mini"><b>Showing ${lmLbl()}.</b> The last-mile workbook currently ends at ${label(M[LM_LAST])},
         while the cost ledgers run to ${label(M[LAST])}. Figures on this page follow the last-mile calendar. ${info('The month selector drives every other page. When the selected month has no last-mile data, this page falls back to the newest month that does, and says so here.')}</div></div>`
    : '';
  ({OVERVIEW:lmOverview, STORE:lmStore, FC:lmFC, LOCAL:lmLocal, PERF:lmPerf})[S.lm](el, tabs+stale);
}

/* =========================== AUTOMATED SELF-CHECK =========================== */
/* Re-computes every core identity for every month with data, entirely in the
   browser, and reports any figure that does not reconcile to the source file.
   This is the live "cross-check for miscalculation" surfaced on the User Guide. */
function runSelfCheck(){
  const out=[]; let pass=0;
  const rel=(a,b)=> (b==null||!isFinite(b)||Math.abs(b)<1e-9) ? (Math.abs(a)<1e-9?0:1) : Math.abs(a/b-1);
  const chk=(name,mo,a,b,tol)=>{ if(a==null||b==null||isNaN(a)||isNaN(b)) return; const d=rel(a,b); if(d<=tol) pass++; else out.push({name,mo,a,b,d}); };
  for(let i=0;i<=LAST;i++){
    const mo=M[i];
    /* B2B Grand-Total identity: Total WH cost + TFRS16 + Transport = Grand Total */
    ['Dry','Fresh'].concat(DC_ORDER).forEach(sh=>{
      const g=dcRaw(sh,'grand_total')[i];
      if(g) chk(sh+' — Grand Total = WH + TFRS16 + Transport', mo,
        dcRaw(sh,'total_wh')[i]+dcRaw(sh,'tfrs16')[i]+dcRaw(sh,'transport')[i], g, 0.0015);
    });
    /* stored vs recomputed unit costs (file rounds to 2 dp → 1% tolerance) */
    const din=dcRaw('Dry','inbound_case')[i];
    if(din){
      chk('Dry — DC Cost/Case (stored vs WH ÷ cases)', mo, dcRaw('Dry','total_wh')[i]/din, dcRaw('Dry','dc_cost_case')[i], 0.01);
      chk('Dry — B2B Cost/Case (stored vs Grand ÷ cases)', mo, dcRaw('Dry','grand_total')[i]/din, dcRaw('Dry','b2b_cost_case')[i], 0.01);
    }
    const dtr=dcRaw('Dry','trip')[i];
    if(dtr) chk('Dry — MM Cost/Trip (stored vs Transport ÷ trips)', mo, dcRaw('Dry','transport')[i]/dtr, dcRaw('Dry','mm_cost_trip')[i], 0.01);
    const ftn=dcRaw('Fresh','ton')[i];
    if(ftn) chk('Fresh — DC Cost/Kg (stored vs WH ÷ kg)', mo, dcRaw('Fresh','total_wh')[i]/(ftn*1000), dcRaw('Fresh','dc_cost_kg')[i], 0.01);
    /* FC: Total Cost = Operation + Last-Mile */
    FC_ORDER.forEach(c=>{ const f=FC[c]; if(f.total[i]) chk(f.name+' — Total = Operation + Last-Mile', mo, f.op[i]+f.lm[i], f.total[i], 0.01); });
    /* Total SCM = sum of the four reported segments */
    if(SEG.total[i]) chk('Total SCM = DC (incl TFRS16) + Mid-Mile + FC Operation + Last-Mile (FC+Store+Local)', mo, SEG.b2bWH[i]+SEG.midMile[i]+SEG.fcOp[i]+SEG.lastMile[i], SEG.total[i], 1e-6);
  }
  return {pass, fail:out.length, rows:out};
}

/* KPI dictionary live search (User Guide §③) */
function filterKPI(q){
  q=(q||'').trim().toLowerCase();
  const t=document.getElementById('kpiTable'); if(!t) return;
  let shown=0;
  t.querySelectorAll('tbody tr').forEach(tr=>{ const ok=(!q || tr.textContent.toLowerCase().indexOf(q)>=0); tr.style.display=ok?'':'none'; if(ok) shown++; });
  const n=document.getElementById('kpiCount'); if(n) n.textContent = shown+' shown';
}

    cols:[

      ['fc','FC', r=>r.s.name],
      ['cost','Delivery cost, LMD (MB)', r=>r.s.costMB],
      ['sales','Sales, RMS (MB)', r=>r.s.salesMB],
      ['fleet','Fleet (trucks)', r=>r.s.fleet],
      ['c2s','Cost to sales, LMD', r=>r.s.sales? r.s.cost/r.s.sales : null],
      ['pnlcost','Delivery cost, FC P&L (MB)', r=>FC[r.s.code]? FC[r.s.code].lm[LM_LAST] : null],
      ['pnlsales','Sales, FC P&L / AO (MB)', r=>FC[r.s.code]? FC[r.s.code].sales[LM_LAST] : null],
      ['gap','Cost gap LMD − FC P&L (MB)', r=>FC[r.s.code]? r.s.costMB - FC[r.s.code].lm[LM_LAST] : null],
    ]},
};
function rawCols(){ const d=RAW_DS[RAWSEL.ds];
  if(!RAWSEL.cols) RAWSEL.cols = d.cols.map(c=>c[0]);
  return d.cols.filter(c=>RAWSEL.cols.indexOf(c[0])>=0); }
function rawToggle(key){ const i=RAWSEL.cols.indexOf(key);
  if(i>=0){ if(RAWSEL.cols.length>1) RAWSEL.cols.splice(i,1); } else RAWSEL.cols.push(key);
  render(); }
function rawSetDs(ds){ RAWSEL.ds=ds; RAWSEL.cols=null; render(); }
function rawAll(on){ RAWSEL.cols = on? RAW_DS[RAWSEL.ds].cols.map(c=>c[0]) : [RAW_DS[RAWSEL.ds].cols[0][0]]; render(); }
function rawMatrix(){
  const d=RAW_DS[RAWSEL.ds], cols=rawCols();
  const head=cols.map(c=>c[1]);
  const body=d.rows().map(r=>cols.map(c=>{ const v=c[2](r); return (v==null||v==='')? '' : v; }));
  return {head, body};
}
function rawCSV(){
  const {head, body}=rawMatrix();
  const esc=v=>{ const s=String(v); return /[",\n]/.test(s)? '"'+s.replace(/"/g,'""')+'"' : s; };
  return [head.map(esc).join(',')].concat(body.map(r=>r.map(esc).join(','))).join('\r\n');
}
function rawDownload(){
  try{
    const blob=new Blob(['﻿'+rawCSV()], {type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='SCM_'+RAWSEL.ds+'_'+(M[LAST]||'export')+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }catch(e){ rawCopy(); }
}
function rawCopy(){
  const t=rawCSV();
  try{ navigator.clipboard.writeText(t); alert('Copied '+rawMatrix().body.length+' rows to the clipboard — paste straight into Excel.'); }
  catch(e){ window.prompt('Copy the CSV below (Ctrl/Cmd + C):', t); }
}
function pgRaw(el){
  const d=RAW_DS[RAWSEL.ds], cols=rawCols(), {head, body}=rawMatrix();
  const fmtCell=v=> typeof v==='number' ? fmt(v, Math.abs(v)>=1000?0:(Math.abs(v)>=10?2:4)) : v;
  const srcOf = { lm:'LM Cost Data.xlsb', lmfc:'LM Cost Data.xlsb', fc:'FC Cost Data (P&L)',
                  dc:'DC Cost Data (operation) + MM Cost Data (mid-mile)', summary:'all source files' }[RAWSEL.ds];
  el.innerHTML = `
  <div class="card" style="margin-bottom:14px">
    <div class="step"><span class="stepn">1</span><span class="steph">Choose a dataset</span>
      <span class="steps">${Object.keys(RAW_DS).length} available</span></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(215px,1fr))">
      ${Object.keys(RAW_DS).map(k=>{const t=RAW_DS[k].name.split(' — ');
        return `<div class="dscard ${RAWSEL.ds===k?'on':''}" onclick="rawSetDs('${k}')">
          <b>${t[0]}</b><span>${t[1]||''}</span></div>`;}).join('')}
    </div>
  </div>
  <div class="grid g2">
    <div class="card">
      <div class="step"><span class="stepn">2</span><span class="steph">Pick the columns</span>
        <span class="steps">${cols.length} of ${d.cols.length} selected</span></div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <button class="btn" onclick="rawAll(true)">${ICO.all} Select all</button>
        <button class="btn" onclick="rawAll(false)">${ICO.clear} Clear</button>
      </div>
      <div class="collist">
        ${d.cols.map((c,ix)=>{const on=RAWSEL.cols.indexOf(c[0])>=0;
          return `<div class="colrow ${on?'on':''}" onclick="rawToggle('${c[0]}')">
            <span class="box">${on?ICO.check:''}</span>
            <span class="cname">${c[1]}</span>
            <span class="cnum">${ix+1}</span></div>`;}).join('')}
      </div>
      <div class="note">${d.note}</div>
    </div>
    <div class="card">
      <div class="step"><span class="stepn">3</span><span class="steph">Export</span></div>
      <div class="expbox">
        <div class="expfig"><b>${body.length.toLocaleString('en-US')}</b><span>rows</span></div>
        <div class="expx">×</div>
        <div class="expfig"><b>${cols.length}</b><span>columns</span></div>
        <div class="expfile">${ICO.file}<span>SCM_${RAWSEL.ds}_${M[LAST]}.csv</span></div>
      </div>
      <div class="sub">${d.unit}</div>
      <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
        <button class="btn primary big" onclick="rawDownload()">${ICO.down} Download CSV</button>
        <button class="btn big" onclick="rawCopy()">${ICO.copy} Copy to clipboard</button>
      </div>
      <div class="note">Opens straight in Excel. Values export unrounded, so anything you build from the export matches the dashboard exactly. Money columns are in MB (millions of baht).</div>
      <div class="note"><b>Source:</b> ${srcOf} — the same arrays that draw the charts, so an export can never disagree with a page.</div>
    </div>
  </div>
  <div class="card" style="margin-top:14px">
    <h4>${ICO.table} All ${body.length.toLocaleString('en-US')} rows ${info('The whole table is here — scroll inside the box. The header stays in place as you scroll.')}</h4>
    <div class="rawscroll">${tbl(head, body.map(r=>r.map(fmtCell)))}</div>
  </div>`;
}


</script>
</body>
</html>
